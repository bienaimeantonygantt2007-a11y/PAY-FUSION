<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store — Mes Commandes</title>
    
    <!-- 
        ==========================================================================
        FOX STORE ARCHITECTURE v9.0 - ORDERS TRACKING ELITE
        REAL-TIME SYNC | LUXURY MINIMALISM | MOBILE-FIRST
        ZERO SIMULATION - PRODUCTION READY
        ==========================================================================
    -->

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0f172a;
            --white: #ffffff;
            --bg: #ffffff; 
            --card-bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #eef2f6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { 
            color: var(--primary); font-size: 1.1rem; text-decoration: none; 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; transition: var(--transition); background: var(--card-bg);
        }
        header h1 { font-size: 0.9rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; margin-left: 15px; }

        .container { padding: 20px 5% 100px; max-width: 600px; margin: 0 auto; }

        /* --- STATUS CHIPS (FILTERS) --- */
        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 18px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 50px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- ORDER CARDS --- */
        .order-list { display: flex; flex-direction: column; gap: 12px; }
        .order-card {
            background: var(--white); border-radius: var(--radius); padding: 18px;
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: var(--transition);
            animation: slideUp 0.5s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .order-left { display: flex; align-items: center; gap: 15px; }
        .order-icon { width: 48px; height: 48px; background: var(--card-bg); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.2rem; border: 1px solid var(--border); }
        
        .order-info h4 { font-size: 0.9rem; font-weight: 800; color: var(--secondary); margin-bottom: 2px; }
        .order-info p { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }
        .order-date { font-size: 0.65rem; color: #cbd5e1; margin-top: 4px; display: block; text-transform: uppercase; font-weight: 700; }

        .order-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .order-price { font-weight: 800; color: var(--primary); font-size: 0.95rem; }
        
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .st-en-attente { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .st-validé { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .st-rejeté { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        /* --- EMPTY STATE --- */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3.5rem; margin-bottom: 20px; opacity: 0.2; }
        .empty-state p { font-weight: 700; font-size: 0.9rem; margin-bottom: 20px; }
        .btn-shop { display: inline-block; padding: 12px 25px; background: var(--primary); color: white; text-decoration: none; border-radius: 12px; font-weight: 800; font-size: 0.8rem; transition: 0.3s; }

        /* --- LOADING SPINNER --- */
        #loader { text-align: center; padding: 50px; color: var(--primary); }

        @media (max-width: 480px) {
            .container { padding: 15px 5%; }
            .order-card { padding: 15px; }
            .order-icon { width: 42px; height: 42px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>Suivi des Achats</h1>
    </header>

    <div class="container">
        
        <!-- FILTRES RAPIDES -->
        <div class="filter-scroll">
            <div class="chip active" onclick="filterBy('all', this)">Toutes</div>
            <div class="chip" onclick="filterBy('en-attente', this)">En attente</div>
            <div class="chip" onclick="filterBy('Validé', this)">Validées</div>
            <div class="chip" onclick="filterBy('Rejeté', this)">Rejetées</div>
        </div>

        <!-- LISTE DES COMMANDES -->
        <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
        <div class="order-list" id="orderList"></div>

        <!-- ÉTAT VIDE -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-shopping-bag"></i>
            <p>Vous n'avez pas encore de commandes.</p>
            <a href="/home.html" class="btn-shop">Découvrir les services</a>
        </div>

    </div>

    <script>
        /* ==========================================================================
           MOTEUR DE SUIVI TEMPS RÉEL (ZÉRO SIMULATION)
           ========================================================================== */

        // 1. CONFIGURATION MASTER
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09",
            measurementId: "G-8FEQG6B7ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let allOrders = [];
        let activeFilter = 'all';

        // 2. ÉCOUTEUR DE SESSION & RÉCUPÉRATION DATA
        auth.onAuthStateChanged(user => {
            if (user) {
                // Écoute en temps réel des commandes de cet utilisateur
                db.collection("orders")
                  .where("userId", "==", user.uid)
                  .orderBy("createdAt", "desc")
                  .onSnapshot(snapshot => {
                      document.getElementById('loader').style.display = 'none';
                      allOrders = [];
                      
                      snapshot.forEach(doc => {
                          allOrders.push({ id: doc.id, ...doc.data() });
                      });

                      renderOrders();

                      // Anti-Ban Security check
                      db.collection("users").doc(user.uid).get().then(uDoc => {
                          if(uDoc.exists && uDoc.data().status === "Banni") window.location.href = "/logout.html";
                      });
                  }, error => {
                      console.error("Erreur Firestore:", error);
                      document.getElementById('loader').innerHTML = `<p style="font-size:0.7rem; color:red;">Erreur de synchronisation.</p>`;
                  });
            } else {
                window.location.href = "/login.html";
            }
        });

        // 3. MOTEUR DE RENDU DYNAMIQUE
        function renderOrders() {
            const container = document.getElementById('orderList');
            const empty = document.getElementById('emptyState');
            
            // Filtrage local
            const filtered = activeFilter === 'all' 
                ? allOrders 
                : allOrders.filter(o => o.status === activeFilter);

            container.innerHTML = '';

            if (filtered.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            filtered.forEach(order => {
                const date = order.createdAt 
                    ? new Date(order.createdAt.seconds * 1000).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'}) 
                    : "En cours...";
                
                const statusClass = `st-${order.status.toLowerCase().replace(' ', '-')}`;
                
                // Iconographie intelligente par catégorie
                let icon = "fa-box-open";
                const cat = order.service.category;
                if(cat === "gaming") icon = "fa-gamepad";
                else if(cat === "streaming") icon = "fa-play-circle";
                else if(cat === "financière" || cat === "crypto") icon = "fa-wallet";

                container.innerHTML += `
                    <div class="order-card">
                        <div class="order-left">
                            <div class="order-icon"><i class="fas ${icon}"></i></div>
                            <div class="order-info">
                                <h4>${order.service.name}</h4>
                                <p>${order.service.product}</p>
                                <span class="order-date">${date}</span>
                            </div>
                        </div>
                        <div class="order-right">
                            <span class="order-price">${order.service.price.toLocaleString()} HTG</span>
                            <span class="status-badge ${statusClass}">${order.status}</span>
                        </div>
                    </div>
                `;
            });
        }

        // 4. LOGIQUE DES FILTRES
        function filterBy(status, el) {
            activeFilter = status;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderOrders();
        }

    </script>
</body>
</html>
