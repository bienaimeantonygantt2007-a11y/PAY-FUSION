<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Mes Commandes</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0056b3;
            --primary-light: #00d2ff;
            --secondary: #002d5e;
            --white: #ffffff;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(0, 86, 179, 0.08);
            --success: #00c853;
            --warning: #ffab00;
            --danger: #ff4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; }

        /* --- HEADER COMPACT --- */
        header {
            height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .back-btn { 
            color: var(--primary); font-size: 1.2rem; text-decoration: none; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; transition: var(--transition);
        }
        .back-btn:hover { background: #f0f7ff; }

        header h1 { font-size: 1rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }

        /* --- FILTRES CHIPS --- */
        .filters {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px;
            margin-bottom: 15px; scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .chip {
            padding: 10px 20px; background: var(--white); border-radius: 50px; font-size: 0.8rem;
            white-space: nowrap; cursor: pointer; transition: var(--transition); 
            color: var(--text-muted); font-weight: 700; border: 1.5px solid var(--border);
        }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(0, 86, 179, 0.2); }

        /* --- CARDS COMMANDES --- */
        .order-card {
            background: var(--white); border-radius: 20px; padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid var(--border);
            margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px;
            transition: var(--transition); animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .order-header { display: flex; justify-content: space-between; align-items: center; }
        .order-id { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; font-family: monospace; }
        
        .status-badge {
            padding: 5px 12px; border-radius: 50px; font-size: 0.65rem; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .status-en-attente { background: #fff8e1; color: var(--warning); }
        .status-validé { background: #e8f5e9; color: var(--success); }
        .status-livré { background: #e0f7fa; color: #006064; }
        .status-rejeté { background: #ffebee; color: var(--danger); }

        .order-content { display: flex; align-items: center; gap: 15px; }
        .order-icon { 
            width: 50px; height: 50px; background: #f0f7ff; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.3rem;
        }
        .order-details h3 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); }
        .order-details p { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        .order-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 12px; border-top: 1px solid var(--bg-body);
        }
        .order-date { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .order-total { font-weight: 800; color: var(--primary); font-size: 1rem; }

        /* --- ÉTATS --- */
        #loading { text-align: center; padding: 40px; color: var(--primary); }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state i { font-size: 3.5rem; color: #e2e8f0; margin-bottom: 15px; display: block; }
        .empty-state p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }

        .btn-shop {
            display: inline-block; padding: 12px 25px; background: var(--primary); color: white;
            text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>Mes Commandes</h1>
    </header>

    <div class="container">
        <!-- Filtres -->
        <div class="filters">
            <div class="chip active" onclick="applyFilter('all', this)">Toutes</div>
            <div class="chip" onclick="applyFilter('en-attente', this)">En attente</div>
            <div class="chip" onclick="applyFilter('Validé', this)">Validées</div>
            <div class="chip" onclick="applyFilter('Rejeté', this)">Rejetées</div>
        </div>

        <!-- Chargement -->
        <div id="loading">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 10px; font-weight: 700; font-size: 0.8rem;">Mise à jour...</p>
        </div>

        <!-- Liste des commandes -->
        <div id="ordersContainer"></div>

        <!-- Vide -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-shopping-bag"></i>
            <p>Vous n'avez pas encore passé de commande.</p>
            <a href="/home.html" class="btn-shop">Découvrir nos services</a>
        </div>
    </div>

    <script>
        // Configuration Firebase Master Fox Store
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09",
            measurementId: "G-8FEQG6B7ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let userOrders = [];
        let activeFilter = 'all';

        auth.onAuthStateChanged(user => {
            if (user) {
                // Écoute en temps réel des commandes de l'utilisateur
                db.collection("orders")
                  .where("userId", "==", user.uid)
                  .onSnapshot((snapshot) => {
                      document.getElementById('loading').style.display = 'none';
                      
                      userOrders = [];
                      snapshot.forEach(doc => {
                          userOrders.push({ id: doc.id, ...doc.data() });
                      });

                      // Tri par date décroissante (les plus récentes en premier)
                      userOrders.sort((a, b) => {
                          const dateA = a.createdAt ? a.createdAt.seconds : 0;
                          const dateB = b.createdAt ? b.createdAt.seconds : 0;
                          return dateB - dateA;
                      });

                      renderOrders();
                  }, (error) => {
                      console.error("Erreur Firestore:", error);
                      document.getElementById('loading').innerHTML = "<p style='color:red;'>Erreur de synchronisation.</p>";
                  });
            } else {
                window.location.href = "/login.html";
            }
        });

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const emptyState = document.getElementById('emptyState');
            
            // Filtrage
            const filtered = activeFilter === 'all' 
                ? userOrders 
                : userOrders.filter(o => o.status === activeFilter);

            container.innerHTML = '';

            if(filtered.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            filtered.forEach(order => {
                const date = order.createdAt 
                    ? new Date(order.createdAt.seconds * 1000).toLocaleDateString('fr-FR', {day: 'numeric', month: 'short'}) 
                    : "En cours";
                
                const statusClass = order.status.toLowerCase().replace(' ', '-');
                
                // Choix de l'icône par catégorie
                let icon = "fa-box";
                const category = order.service.category;
                if(category === "gaming") icon = "fa-gamepad";
                if(category === "streaming") icon = "fa-play-circle";
                if(category === "financière" || category === "crypto") icon = "fa-wallet";

                container.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">REF: #${order.orderId || order.id.substring(0,8).toUpperCase()}</span>
                            <span class="status-badge status-${statusClass}">${order.status}</span>
                        </div>
                        <div class="order-content">
                            <div class="order-icon"><i class="fas ${icon}"></i></div>
                            <div class="order-details">
                                <h3>${order.service.name}</h3>
                                <p>${order.service.product}</p>
                            </div>
                        </div>
                        <div class="order-footer">
                            <span class="order-date"><i class="far fa-calendar-alt"></i> ${date}</span>
                            <span class="order-total">${order.service.price.toLocaleString()} HTG</span>
                        </div>
                    </div>
                `;
            });
        }

        function applyFilter(status, element) {
            activeFilter = status;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            renderOrders();
        }
    </script>
</body>
</html>
