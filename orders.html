<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store — Mes Achats</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e3a8a; --secondary: #0f172a; --white: #ffffff;
            --bg: #ffffff; --card-bg: #f8fafc; --text-main: #1e293b;
            --text-muted: #64748b; --border: #eef2f6; --success: #10b981;
            --warning: #f59e0b; --error: #ef4444; --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.5; min-height: 100vh; }

        header {
            height: 65px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { color: var(--primary); font-size: 1.1rem; text-decoration: none; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: var(--transition); background: var(--card-bg); }

        .container { padding: 20px 5% 100px; max-width: 650px; margin: 0 auto; }

        /* --- FILTERS --- */
        .filter-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .chip { padding: 8px 18px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 50px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- ORDER CARDS --- */
        .order-card {
            background: var(--white); border-radius: 20px; padding: 18px;
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px;
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .order-left { display: flex; align-items: center; gap: 15px; }
        .order-icon { width: 48px; height: 48px; background: var(--card-bg); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.2rem; border: 1px solid var(--border); position: relative; }
        .wallet-badge { position: absolute; bottom: -5px; right: -5px; width: 20px; height: 20px; background: var(--secondary); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; border: 2px solid white; }

        .order-info h4 { font-size: 0.9rem; font-weight: 800; color: var(--secondary); margin-bottom: 2px; }
        .order-info p { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }
        .order-date { font-size: 0.6rem; color: #cbd5e1; font-weight: 700; text-transform: uppercase; margin-top: 4px; display: block; }

        .order-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .order-price { font-weight: 900; color: var(--primary); font-size: 0.95rem; }
        
        .status-pill { padding: 4px 10px; border-radius: 6px; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; }
        .st-en-attente { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .st-validé { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .st-rejeté { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        /* --- MESSAGES D'ERREUR ET VIDE --- */
        #loader { text-align: center; padding: 60px; color: var(--primary); }
        #error-msg { display: none; text-align: center; padding: 40px 20px; background: #fff5f5; border-radius: 15px; border: 1px solid #fee2e2; color: var(--error); margin-bottom: 20px; }
        #error-msg a { color: var(--primary); font-weight: 800; text-decoration: underline; display: block; margin-top: 10px; font-size: 0.7rem; }
        
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.2; }
    </style>
</head>
<body>

    <header>
        <a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 style="font-size:0.9rem; font-weight:800; text-transform:uppercase; margin-left:15px;">Historique Fox</h1>
    </header>

    <div class="container">
        <!-- Message d'erreur dynamique -->
        <div id="error-msg">
            <i class="fas fa-exclamation-triangle"></i> 
            <span id="errText">Erreur de chargement Firebase.</span>
            <a id="indexLink" href="#" target="_blank">Cliquez ici pour créer l'index requis</a>
        </div>
        
        <div class="filter-wrapper">
            <div class="chip active" onclick="setFilter('all', this)">Toutes</div>
            <div class="chip" onclick="setFilter('en-attente', this)">En attente</div>
            <div class="chip" onclick="setFilter('Validé', this)">Validées</div>
        </div>

        <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
        <div class="order-list" id="orderList"></div>

        <div class="empty-state" id="emptyMsg" style="display: none;">
            <i class="fas fa-receipt"></i>
            <p style="font-weight:700;">Aucun achat pour le moment.</p>
        </div>
    </div>

    <script>
        // CONFIGURATION MASTER
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09",
            measurementId: "G-8FEQG6B7ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let orders = [];
        let filter = 'all';

        auth.onAuthStateChanged(user => {
            if (user) {
                // TENTATIVE DE RÉCUPÉRATION AVEC GESTION D'ERREUR
                db.collection("orders")
                  .where("userId", "==", user.uid)
                  .orderBy("createdAt", "desc") // <--- Ceci demande un INDEX dans Firebase
                  .onSnapshot(snap => {
                      document.getElementById('loader').style.display = 'none';
                      document.getElementById('error-msg').style.display = 'none';
                      orders = [];
                      snap.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                      render();
                  }, err => {
                      console.error("Erreur Firebase:", err);
                      document.getElementById('loader').style.display = 'none';
                      const errBox = document.getElementById('error-msg');
                      errBox.style.display = 'block';

                      // Si l'erreur est liée à l'index (très courant)
                      if(err.message.includes("index")) {
                          document.getElementById('errText').textContent = "L'index de tri est en cours de création ou manquant.";
                          // Firebase fournit souvent un lien direct dans la console, mais ici on guide l'user
                          document.getElementById('indexLink').style.display = 'block';
                      }
                  });
            } else { window.location.href = "/login.html"; }
        });

        function render() {
            const cont = document.getElementById('orderList');
            const empty = document.getElementById('emptyMsg');
            const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);

            cont.innerHTML = '';
            if (filtered.length === 0) { empty.style.display = 'block'; return; }
            empty.style.display = 'none';

            filtered.forEach(o => {
                const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleDateString('fr-FR', {day:'numeric', month:'short'}) : "...";
                const stClass = `st-${o.status.toLowerCase().replace(' ', '-')}`;
                
                let icon = "fa-box";
                if(o.service?.category === "gaming") icon = "fa-gamepad";
                else if(o.service?.category === "streaming") icon = "fa-play-circle";
                else if(o.service?.category === "financière" || o.service?.category === "crypto") icon = "fa-wallet";

                const isWallet = o.payment?.method === "portefeuille" || o.payment?.proof === "PAID_BY_WALLET";

                cont.innerHTML += `
                    <div class="order-card">
                        <div class="order-left">
                            <div class="order-icon">
                                <i class="fas ${icon}"></i>
                                ${isWallet ? '<div class="wallet-badge"><i class="fas fa-bolt"></i></div>' : ''}
                            </div>
                            <div class="order-info">
                                <h4>${o.service?.name || "Service"}</h4>
                                <p>${o.service?.product || "Achat"}</p>
                                <span class="order-date">${date}</span>
                            </div>
                        </div>
                        <div class="order-right">
                            <span class="order-price">${(o.service?.price || 0).toLocaleString()} HTG</span>
                            <span class="status-pill ${stClass}">${o.status}</span>
                        </div>
                    </div>
                `;
            });
        }

        function setFilter(s, el) {
            filter = s;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render();
        }
    </script>
</body>
</html>
