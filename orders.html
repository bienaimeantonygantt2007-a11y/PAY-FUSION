<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store • Mes commandes</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           VARIABLES DESIGN SYSTEM (ROYAL BLUE & BLANC)
           ========================================================================== */
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b5ba5;
            --primary-dark: #0f2b6b;
            --white: #ffffff;
            --off-white: #f8fafc;
            --gray-50: #f9f9f9;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --error: #ef4444;
            --error-light: #fee2e2;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --transition: all 0.2s ease;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-2xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--off-white);
            color: var(--gray-900);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==========================================================================
           HEADER (mobile-first)
           ========================================================================== */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 40;
            box-shadow: var(--shadow-sm);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: var(--gray-50);
            border: 1px solid var(--border);
            color: var(--gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--gray-100);
            color: var(--primary);
            border-color: var(--primary);
        }

        .logo {
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-weight: 400;
            color: var(--gray-500);
            background: none;
            -webkit-text-fill-color: var(--gray-500);
            font-size: 1rem;
            margin-left: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: var(--gray-50);
            border: 1px solid var(--border);
            color: var(--gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .icon-btn:hover {
            background: var(--gray-100);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* ==========================================================================
           MAIN CONTENT
           ========================================================================== */
        .main {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 20px;
            width: 100%;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-bottom: 24px;
        }

        /* ==========================================================================
           FILTER TABS
           ========================================================================== */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 40px;
            background: var(--white);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .filter-tab:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
        }

        .filter-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ==========================================================================
           ORDERS LIST
           ========================================================================== */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
        }

        .order-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-id {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--gray-800);
        }

        .order-date {
            font-size: 0.75rem;
            color: var(--gray-500);
        }

        .order-service {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .service-icon {
            width: 48px;
            height: 48px;
            background: var(--off-white);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .service-details {
            flex: 1;
        }

        .service-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--gray-800);
            margin-bottom: 2px;
        }

        .service-product {
            font-size: 0.8rem;
            color: var(--gray-500);
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .order-amount {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-pending {
            background: var(--warning-light);
            color: var(--warning);
        }

        .badge-success {
            background: var(--success-light);
            color: var(--success);
        }

        .badge-error {
            background: var(--error-light);
            color: var(--error);
        }

        .badge-info {
            background: rgba(30, 58, 138, 0.1);
            color: var(--primary);
        }

        /* ==========================================================================
           EMPTY STATE
           ========================================================================== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.9rem;
            color: var(--gray-500);
            margin-bottom: 20px;
        }

        .btn-primary {
            display: inline-block;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ==========================================================================
           MODAL (détails commande)
           ========================================================================== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--gray-50);
            border: 1px solid var(--border);
            color: var(--gray-500);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--gray-100);
            color: var(--primary);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }

        .detail-item label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-item p {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray-800);
            word-break: break-word;
        }

        /* ==========================================================================
           LOADING SKELETON
           ========================================================================== */
        .skeleton {
            background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-lg);
            height: 120px;
            margin-bottom: 12px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ==========================================================================
           TOAST NOTIFICATION
           ========================================================================== */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--white);
            padding: 12px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            font-weight: 500;
            font-size: 0.85rem;
            min-width: 280px;
            border: 1px solid var(--border);
        }

        .toast.active {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        /* ==========================================================================
           RESPONSIVE
           ========================================================================== */
        @media (min-width: 768px) {
            .modal-content {
                border-radius: var(--radius-xl);
                margin-bottom: 0;
            }
            .modal {
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="/home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo">
                FOX<span>orders</span>
            </div>
        </div>
        <div class="header-right">
            <a href="/user/wallet.html" class="icon-btn" title="Portefeuille">
                <i class="fas fa-credit-card"></i>
            </a>
            <a href="/user/account.html" class="icon-btn">
                <i class="fas fa-user"></i>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <h1 class="page-title">Mes commandes</h1>
        <p class="page-subtitle">Suivez l'état de vos achats</p>

        <!-- Filter tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterOrders('all')">Toutes</button>
            <button class="filter-tab" onclick="filterOrders('en-attente')">En attente</button>
            <button class="filter-tab" onclick="filterOrders('Validé')">Validées</button>
            <button class="filter-tab" onclick="filterOrders('Rejeté')">Rejetées</button>
        </div>

        <!-- Orders list -->
        <div id="ordersContainer" class="orders-list">
            <!-- Skeleton loaders -->
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <!-- Empty state (hidden by default) -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-box-open"></i>
            <h3>Aucune commande</h3>
            <p>Vous n'avez pas encore effectué d'achat.</p>
            <a href="/home.html" class="btn-primary">Découvrir nos services</a>
        </div>
    </main>

    <!-- Order Detail Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Détails de la commande</h3>
                <div class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div id="orderDetailContent">
                <!-- Rempli dynamiquement -->
            </div>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09"
        };

        // Initialisation Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==========================================================================
        // VARIABLES GLOBALES
        // ==========================================================================
        let currentUser = null;
        let allOrders = [];
        let filteredOrders = [];

        // ==========================================================================
        // AUTHENTIFICATION
        // ==========================================================================
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadOrders();
            } else {
                window.location.href = '/login.html';
            }
        });

        // ==========================================================================
        // TOAST
        // ==========================================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('active'), 100);
            setTimeout(() => {
                toast.classList.remove('active');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ==========================================================================
        // CHARGEMENT DES COMMANDES
        // ==========================================================================
        function loadOrders() {
            db.collection('orders')
                .where('userId', '==', currentUser.uid)
                .orderBy('createdAt', 'desc')
                .onSnapshot(snapshot => {
                    allOrders = [];
                    snapshot.forEach(doc => {
                        allOrders.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Appliquer le filtre actif
                    const activeFilter = document.querySelector('.filter-tab.active').textContent.toLowerCase();
                    if (activeFilter === 'toutes') {
                        filteredOrders = allOrders;
                    } else if (activeFilter === 'en attente') {
                        filteredOrders = allOrders.filter(o => o.status === 'en-attente');
                    } else if (activeFilter === 'validées') {
                        filteredOrders = allOrders.filter(o => o.status === 'Validé');
                    } else if (activeFilter === 'rejetées') {
                        filteredOrders = allOrders.filter(o => o.status === 'Rejeté');
                    } else {
                        filteredOrders = allOrders;
                    }

                    renderOrders(filteredOrders);
                }, error => {
                    console.error("Erreur chargement commandes:", error);
                    showToast("Erreur de chargement", "error");
                });
        }

        // ==========================================================================
        // RENDU DES COMMANDES
        // ==========================================================================
        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');
            const emptyState = document.getElementById('emptyState');

            if (orders.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            let html = '';
            orders.forEach(order => {
                const date = order.createdAt ? new Date(order.createdAt.toDate()).toLocaleDateString('fr-FR', {
                    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                }) : 'Date inconnue';

                const statusClass = order.status === 'en-attente' ? 'badge-pending' :
                                   order.status === 'Validé' ? 'badge-success' :
                                   order.status === 'Rejeté' ? 'badge-error' : 'badge-info';

                const statusText = order.status === 'en-attente' ? 'En attente' :
                                  order.status === 'Validé' ? 'Validé' :
                                  order.status === 'Rejeté' ? 'Rejeté' : order.status;

                html += `
                    <div class="order-card" onclick="openOrderModal('${order.id}')">
                        <div class="order-header">
                            <span class="order-id">#${order.orderId || order.id.slice(0,8)}</span>
                            <span class="order-date">${date}</span>
                        </div>
                        <div class="order-service">
                            <div class="service-icon">
                                <i class="fas fa-${getServiceIcon(order.service?.name)}"></i>
                            </div>
                            <div class="service-details">
                                <div class="service-name">${order.service?.name || 'Service'}</div>
                                <div class="service-product">${order.service?.product || ''}</div>
                            </div>
                        </div>
                        <div class="order-footer">
                            <span class="order-amount">${order.service?.price || 0} HTG</span>
                            <span class="badge ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Helper pour icône service (approximatif)
        function getServiceIcon(serviceName) {
            if (!serviceName) return 'shopping-bag';
            const name = serviceName.toLowerCase();
            if (name.includes('free') || name.includes('fire')) return 'gamepad';
            if (name.includes('fc') || name.includes('football')) return 'futbol';
            if (name.includes('pubg')) return 'crosshairs';
            if (name.includes('roblox')) return 'cube';
            if (name.includes('minecraft')) return 'cubes';
            if (name.includes('netflix') || name.includes('disney') || name.includes('prime') || name.includes('crunchy')) return 'film';
            if (name.includes('paypal') || name.includes('wise') || name.includes('usdt')) return 'money-bill-wave';
            if (name.includes('telegram')) return 'telegram';
            if (name.includes('tiktok')) return 'music';
            if (name.includes('meru')) return 'building';
            return 'shopping-bag';
        }

        // ==========================================================================
        // FILTRAGE
        // ==========================================================================
        function filterOrders(filter) {
            // Mettre à jour les onglets
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Filtrer
            if (filter === 'all') {
                filteredOrders = allOrders;
            } else if (filter === 'en-attente') {
                filteredOrders = allOrders.filter(o => o.status === 'en-attente');
            } else if (filter === 'Validé') {
                filteredOrders = allOrders.filter(o => o.status === 'Validé');
            } else if (filter === 'Rejeté') {
                filteredOrders = allOrders.filter(o => o.status === 'Rejeté');
            }

            renderOrders(filteredOrders);
        }

        // ==========================================================================
        // MODALE DÉTAILS
        // ==========================================================================
        function openOrderModal(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            const modalContent = document.getElementById('orderDetailContent');
            const date = order.createdAt ? new Date(order.createdAt.toDate()).toLocaleString('fr-FR') : 'Date inconnue';

            const statusClass = order.status === 'en-attente' ? 'badge-pending' :
                               order.status === 'Validé' ? 'badge-success' :
                               order.status === 'Rejeté' ? 'badge-error' : 'badge-info';
            const statusText = order.status === 'en-attente' ? 'En attente' :
                              order.status === 'Validé' ? 'Validé' :
                              order.status === 'Rejeté' ? 'Rejeté' : order.status;

            const paymentMethod = order.payment?.method || 'N/A';
            const paymentProof = order.payment?.proof ? 
                `<img src="${order.payment.proof}" style="max-width:100%; border-radius:var(--radius-md); border:1px solid var(--border); margin-top:8px;">` : 
                '<p style="color: var(--gray-400);">Aucune preuve</p>';

            modalContent.innerHTML = `
                <div style="margin-bottom: 16px;">
                    <span class="badge ${statusClass}">${statusText}</span>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Service</label>
                        <p>${order.service?.name || 'N/A'}</p>
                    </div>
                    <div class="detail-item">
                        <label>Produit</label>
                        <p>${order.service?.product || 'N/A'}</p>
                    </div>
                    <div class="detail-item">
                        <label>Montant</label>
                        <p>${order.service?.price || 0} HTG</p>
                    </div>
                    <div class="detail-item">
                        <label>Méthode</label>
                        <p>${paymentMethod}</p>
                    </div>
                    <div class="detail-item">
                        <label>Date</label>
                        <p>${date}</p>
                    </div>
                    <div class="detail-item">
                        <label>WhatsApp</label>
                        <p>${order.customerInfo?.whatsapp || 'N/A'}</p>
                    </div>
                    ${order.customerInfo?.gameId ? `
                    <div class="detail-item">
                        <label>ID Jeu</label>
                        <p>${order.customerInfo.gameId}</p>
                    </div>` : ''}
                    ${order.customerInfo?.email ? `
                    <div class="detail-item">
                        <label>Email</label>
                        <p>${order.customerInfo.email}</p>
                    </div>` : ''}
                </div>
                <div style="margin-top: 20px;">
                    <label class="input-label">Preuve de paiement</label>
                    ${paymentProof}
                </div>
            `;

            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }
    </script>
</body>
</html>
