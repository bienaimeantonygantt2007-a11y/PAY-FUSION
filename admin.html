<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Admin — Command Center Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #06070a; --card: #0f121a; --accent: #00d1ff; --white: #ffffff;
            --muted: #8e95a2; --success: #00ff88; --error: #ff4444; --border: rgba(255,255,255,0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; display: flex; font-size: 13px; }

        /* --- SIDEBAR MOBILE RESPONSIVE --- */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100vh; background: var(--card); border-right: 1px solid var(--border); z-index: 5000; transition: var(--transition); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 4500; display: none; }
        .overlay.active { display: block; }

        .sidebar-brand { padding: 40px 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .sidebar-brand img { height: 35px; }
        
        .nav-link { padding: 14px 25px; display: flex; align-items: center; gap: 12px; color: var(--muted); text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--accent); background: rgba(0, 209, 255, 0.05); border-right: 3px solid var(--accent); }

        /* --- MAIN LAYOUT --- */
        .main { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { height: 60px; padding: 0 20px; background: rgba(15,18,26,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top:0; z-index: 1000; }
        
        .btn-menu { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; border: 1px solid var(--border); border-radius: 10px; }

        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .kpi-card { background: var(--card); padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
        .kpi-card span { font-size: 0.55rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .kpi-card h3 { font-size: 1.1rem; margin-top: 5px; font-weight: 800; color: var(--white); }

        .scroller { padding: 15px; flex: 1; overflow-y: auto; }
        .section-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-header h4 { font-weight: 800; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; }

        /* --- LIST ROWS --- */
        .list-row { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .row-info h5 { font-size: 0.85rem; font-weight: 700; color: #fff; }
        .row-info p { font-size: 0.7rem; color: var(--muted); }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .badge-pending { background: rgba(255, 187, 51, 0.1); color: var(--warning); }
        .badge-success { background: rgba(0, 255, 136, 0.1); color: var(--success); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: flex-end; justify-content: center; }
        .modal-box { background: var(--card); width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; padding: 30px; border: 1px solid var(--border); max-height: 85vh; overflow-y: auto; }
        .detail-item { margin-bottom: 15px; }
        .detail-item label { display: block; font-size: 0.55rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
        .detail-item p { font-size: 0.9rem; font-weight: 700; color: #fff; }
        .proof-preview { width: 100%; border-radius: 15px; margin-top: 15px; border: 1px solid var(--border); cursor: pointer; }

        /* --- CMS SWITCHES --- */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background-color: #333; transition: .4s; border-radius: 34px; cursor: pointer; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* --- CHAT CRM --- */
        .chat-layout { display: flex; height: 450px; }
        .chat-sidebar { width: 40%; border-right: 1px solid var(--border); overflow-y: auto; }
        .chat-main { width: 60%; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; }
        .m-admin { align-self: flex-end; background: var(--accent); color: var(--bg); }
        .m-user { align-self: flex-start; background: var(--border); color: #fff; }
        .chat-form { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .chat-input { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 8px; color: #fff; padding: 8px 12px; outline: none; }

        .admin-btn { padding: 10px; border-radius: 10px; border: none; font-weight: 800; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; }

        @media (min-width: 1025px) { .sidebar { left: 0; } .main { margin-left: 280px; } .btn-menu { display: none; } .kpi-grid { grid-template-columns: repeat(4, 1fr); } .chat-layout { height: 600px; } }
    </style>
</head>
<body>

    <div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR ELITE -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand"><img src="/assets/logos/payfusion-logo.png"><h2>COMMAND</h2></div>
        <div class="nav-menu">
            <p class="nav-label">Finance</p>
            <div class="nav-link active" onclick="showSec('orders', this)"><i class="fas fa-chart-line"></i> Revenus</div>
            <div class="nav-link" onclick="showSec('users', this)"><i class="fas fa-user-shield"></i> Utilisateurs</div>
            <p class="nav-label">Système</p>
            <div class="nav-link" onclick="showSec('cms', this)"><i class="fas fa-toggle-on"></i> CMS Services</div>
            <div class="nav-link" onclick="showSec('ads', this)"><i class="fas fa-bullhorn"></i> Annonces</div>
            <p class="nav-label">CRM</p>
            <div class="nav-link" onclick="showSec('chat', this)"><i class="fas fa-comment-dots"></i> Chat Live</div>
        </div>
        <a href="/home.html" class="nav-link" style="margin-top:auto; border-top:1px solid var(--border);"><i class="fas fa-store"></i> Boutique</a>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="main">
        <header>
            <div class="btn-menu" onclick="toggleSidebar()"><i class="fas fa-bars-staggered"></i></div>
            <div id="sectionTitle" style="font-weight: 800; font-size: 0.8rem; text-transform: uppercase;">Commandes</div>
            <div class="badge badge-success">Live</div>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><span>Revenu Brut</span><h3 id="revTotal">0 HTG</h3></div>
            <div class="kpi-card"><span>Profit Net</span><h3 id="profitTotal" style="color:var(--success)">0 HTG</h3></div>
            <div class="kpi-card"><span>Transactions</span><h3 id="orderCount">0</h3></div>
            <div class="kpi-card"><span>En Attente</span><h3 id="waitCount" style="color:var(--warning)">0</h3></div>
        </div>

        <div class="scroller">
            <!-- SECTION COMMANDES -->
            <section id="ordersSec" class="admin-tab">
                <div class="section-card"><div id="ordersList"></div></div>
            </section>

            <!-- SECTION UTILISATEURS -->
            <section id="usersSec" class="admin-tab" style="display:none">
                <div class="section-card">
                    <div class="card-header"><input type="text" id="userSearch" placeholder="Chercher..." style="background:none; border:none; color:#fff; outline:none;" onkeyup="filterUsers(this.value)"></div>
                    <div id="usersList"></div>
                </div>
            </section>

            <!-- SECTION CMS -->
            <section id="cmsSec" class="admin-tab" style="display:none">
                <div class="kpi-grid" id="cmsGrid"></div>
            </section>

            <!-- SECTION ADS -->
            <section id="adsSec" class="admin-tab" style="display:none">
                <div class="section-card" style="padding:20px;">
                    <textarea id="adText" class="chat-input" style="width:100%; height:100px; margin-bottom:10px;" placeholder="Message défilant..."></textarea>
                    <button class="admin-btn" style="background:var(--accent); color:black" onclick="postAd()">Publier l'annonce</button>
                    <div id="adHistory" style="margin-top:20px"></div>
                </div>
            </section>

            <!-- SECTION CHAT -->
            <section id="chatSec" class="admin-tab" style="display:none">
                <div class="section-card chat-layout">
                    <div class="chat-sidebar" id="chatUsers"></div>
                    <div class="chat-main">
                        <div class="chat-msgs" id="chatFlow"></div>
                        <form id="chatForm" class="chat-form">
                            <input type="text" id="adminReply" class="chat-input" placeholder="Répondre...">
                            <button type="submit" class="btn-menu" style="width:35px; height:35px; border-color:var(--accent); color:var(--accent);"><i class="fas fa-paper-plane"></i></button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- MODAL COMMANDE -->
    <div class="modal" id="orderModal">
        <div class="modal-box">
            <i class="fas fa-times close-btn" onclick="closeModal()"></i>
            <h3 style="font-weight:800; color:var(--accent); margin-bottom:20px;">Fiche Transaction</h3>
            <div class="detail-grid" id="modalFields"></div>
            <img id="orderImg" class="proof-preview" onclick="window.open(this.src)">
            <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                <label style="font-size:0.55rem; font-weight:800; color:var(--muted); text-transform:uppercase;">Coût d'achat (HTG)</label>
                <input type="number" id="purchaseCost" class="chat-input" style="width:100%; margin:10px 0;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="admin-btn" style="background:var(--success); color:black" onclick="processOrder('Validé')">Valider</button>
                    <button class="admin-btn" style="background:var(--error); color:white" onclick="processOrder('Rejeté')">Rejeter</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();
        let orders = [], users = [], activeOrderID = null, activeChatUID = null;

        auth.onAuthStateChanged(user => {
            if(!user || user.email !== "bmarcco4412@gmail.com") window.location.href = "/login.html";
            else launchEngine();
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
        function showSec(id, el) {
            document.querySelectorAll('.admin-tab').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id + 'Sec').style.display = 'block';
            el.classList.add('active'); document.getElementById('sectionTitle').textContent = el.textContent.trim();
            if(window.innerWidth < 1025) toggleSidebar();
        }

        function launchEngine() {
            // Orders Engine
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('ordersList'); list.innerHTML = '';
                let rev = 0, prof = 0, wait = 0; orders = [];
                snap.forEach(doc => {
                    const o = doc.data(); const id = doc.id; orders.push({id, ...o});
                    if(o.status === 'en-attente') wait++;
                    if(o.status === 'Validé') { rev += o.service.price; prof += (o.service.price - (o.purchaseCost || 0)); }
                    list.innerHTML += `<div class="list-row"><div class="row-info"><h5>#${o.orderId}</h5><p>${o.service.name} ● ${o.service.product}</p></div><div style="text-align:right"><span class="badge ${o.status==='en-attente'?'badge-pending':'badge-success'}">${o.status}</span><br><button class="btn-manage" style="margin-top:5px" onclick="openOrder('${id}')">GÉRER</button></div></div>`;
                });
                document.getElementById('revTotal').textContent = rev.toLocaleString() + " HTG";
                document.getElementById('profitTotal').textContent = prof.toLocaleString() + " HTG";
                document.getElementById('orderCount').textContent = snap.size;
                document.getElementById('waitCount').textContent = wait;
            });

            // Users Engine
            db.collection("users").onSnapshot(snap => {
                const list = document.getElementById('usersList'); list.innerHTML = ''; users = [];
                snap.forEach(doc => { const u = doc.data(); users.push({id: doc.id, ...u}); renderUserRow(u, doc.id, list); });
            });

            // CMS Engine
            const listSvc = ['Free Fire', 'FC Mobile', 'eFootball', 'Netflix', 'Disney+', 'PayPal', 'Wise', 'USDT', 'Roblox', 'Blood Strike', 'Crunchyroll', 'Prime Video'];
            db.collection("cms_services").onSnapshot(snap => {
                const grid = document.getElementById('cmsGrid'); grid.innerHTML = '';
                const states = {}; snap.forEach(d => states[d.id] = d.data().active);
                listSvc.forEach(s => {
                    const active = states[s] !== false;
                    grid.innerHTML += `<div class="kpi-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px 20px;"><div><span>Service</span><h4 style="font-size:0.75rem">${s}</h4></div><label class="switch"><input type="checkbox" ${active?'checked':''} onchange="setCMS('${s}', this.checked)"><span class="slider"></span></label></div>`;
                });
            });

            // Marketing Engine
            db.collection("announcements").orderBy("createdAt", "desc").limit(3).onSnapshot(snap => {
                const hist = document.getElementById('adHistory'); hist.innerHTML = '';
                snap.forEach(doc => hist.innerHTML += `<div class="list-row" style="font-size:0.7rem; color:var(--muted)">${doc.data().message}</div>`);
            });

            // Chat Engine
            db.collection("chats").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('chatUsers'); list.innerHTML = ''; const grouped = {};
                snap.forEach(doc => { const c = doc.data(); if(!grouped[c.userUID]) { grouped[c.userUID] = true; list.innerHTML += `<div class="list-row" style="cursor:pointer;" onclick="openChat('${c.userUID}', '${c.userName}')"><div class="row-info"><h5>${c.userName.split('@')[0]}</h5></div></div>`; } });
            });
        }

        function renderUserRow(u, id, list) {
            const isBanned = u.status === 'Banni';
            list.innerHTML += `<div class="list-row"><div class="row-info"><h5>${u.personalInfo.fullName}</h5><p>${u.personalInfo.email}</p></div><button class="btn-manage" style="background:${isBanned?var(--success):var(--error)}" onclick="toggleBan('${id}', '${u.status}')">${isBanned?'ACTIVER':'BANNIR'}</button></div>`;
        }

        function openOrder(id) {
            activeOrderID = id; const o = orders.find(x => x.id === id);
            const grid = document.getElementById('modalFields'); grid.innerHTML = '';
            const data = { "Service": o.service.product, "WhatsApp": o.customerInfo.whatsapp, "Identifiant": o.customerInfo.gameId || o.customerInfo.email, "Montant": o.service.price + " HTG", "Paiement": o.payment.method, "Emetteur": o.payment.senderName };
            for(let [l,v] of Object.entries(data)) grid.innerHTML += `<div class="detail-item"><label>${l}</label><p>${v}</p></div>`;
            document.getElementById('orderImg').src = o.payment.proof;
            document.getElementById('purchaseCost').value = o.purchaseCost || '';
            document.getElementById('orderModal').style.display = 'flex';
        }

        async function processOrder(s) {
            const cost = parseFloat(document.getElementById('purchaseCost').value) || 0;
            await db.collection("orders").doc(activeOrderID).update({ status: s, purchaseCost: cost, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            closeModal();
        }

        function toggleBan(id, s) { db.collection("users").doc(id).update({ status: s === 'Banni' ? 'Actif' : 'Banni' }); }
        function setCMS(id, val) { db.collection("cms_services").doc(id).set({ active: val }, { merge: true }); }
        async function postAd() { const val = document.getElementById('adText').value; if(val) { await db.collection("announcements").add({ message: val, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); document.getElementById('adText').value = ''; } }

        function openChat(uid, name) {
            activeChatUID = uid; document.getElementById('chatFlow').innerHTML = '';
            db.collection("chats").where("userUID", "==", uid).orderBy("timestamp", "asc").onSnapshot(snap => {
                const flow = document.getElementById('chatFlow'); flow.innerHTML = '';
                snap.forEach(doc => { const m = doc.data(); const side = m.sender === 'admin' ? 'm-admin' : 'm-user'; flow.innerHTML += `<div class="m ${side}">${m.text}</div>`; });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        document.getElementById('chatForm').onsubmit = async (e) => {
            e.preventDefault(); const msg = document.getElementById('adminReply').value; if(!msg || !activeChatUID) return;
            await db.collection("chats").add({ userUID: activeChatUID, text: msg, sender: "admin", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('adminReply').value = '';
        };

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
    </script>
</body>
</html>
