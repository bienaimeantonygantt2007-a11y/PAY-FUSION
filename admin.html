<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fox Store – Administration</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ---------- RESET & BASE (Mobile First) ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fc; color: #1e293b; line-height: 1.5; min-height: 100vh; }
        
        /* ---------- NAVBAR ---------- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #eef2ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.3rem;
            color: #0f172a;
        }
        .logo i { font-size: 1.4rem; color: #00d1ff; }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        .btn-icon {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-icon:hover { background: #e2e8f0; }
        
        /* ---------- SIDEBAR (Drawer mobile, latéral desktop) ---------- */
        .sidebar {
            position: fixed;
            top: 60px;
            left: -260px;
            width: 260px;
            height: calc(100% - 60px);
            background: white;
            border-right: 1px solid #eef2ff;
            z-index: 900;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding: 16px 0;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            z-index: 899;
            display: none;
        }
        .sidebar-overlay.active { display: block; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin: 4px 12px; }
        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            transition: 0.2s;
        }
        .sidebar-menu a i { width: 24px; color: #5b6e8c; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: #f1f5f9; color: #00d1ff; }
        .sidebar-menu a:hover i, .sidebar-menu a.active i { color: #00d1ff; }
        
        /* ---------- MAIN CONTENT ---------- */
        .main-content { margin-top: 60px; padding: 20px 16px 40px; transition: margin-left 0.3s; }
        @media (min-width: 768px) {
            .sidebar { left: 0; }
            .sidebar-overlay { display: none !important; }
            .main-content { margin-left: 260px; }
            .burger-btn { display: none; }
        }
        .burger-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #1e293b; }
        
        /* ---------- CARDS & TABLES ---------- */
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .card {
            background: white;
            border-radius: 24px;
            border: 1px solid #eef2ff;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid #eef2ff;
        }
        .stat-card i { font-size: 1.8rem; color: #00d1ff; }
        .stat-number { font-size: 1.5rem; font-weight: 800; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { font-weight: 600; color: #5b6e8c; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-en-attente { background: #fef3c7; color: #d97706; }
        .status-en-cours { background: #dbeafe; color: #2563eb; }
        .status-valide { background: #d1fae5; color: #059669; }
        .status-livre { background: #a7f3d0; color: #059669; }
        .status-rejete { background: #fee2e2; color: #dc2626; }
        .status-annule { background: #f1f5f9; color: #64748b; }
        
        .btn-sm {
            background: #f1f5f9;
            border: none;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            margin: 2px;
        }
        .btn-primary {
            background: #00d1ff;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.9rem;
        }
        .proof-img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            z-index: 1000;
            text-decoration: none;
        }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.7rem;
            color: #5b6e8c;
            border-top: 1px solid #eef2ff;
            margin-top: 20px;
        }
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            th, td { font-size: 0.7rem; padding: 8px 4px; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo"><i class="fas fa-fox"></i><span>FOX STORE ADMIN</span></div>
        <div class="nav-right">
            <button class="burger-btn" id="burgerBtn"><i class="fas fa-bars"></i></button>
            <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Quitter</span></button>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li><a href="#" data-tab="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a></li>
            <li><a href="#" data-tab="orders"><i class="fas fa-shopping-cart"></i> Commandes</a></li>
            <li><a href="#" data-tab="users"><i class="fas fa-users"></i> Utilisateurs</a></li>
            <li><a href="#" data-tab="products"><i class="fas fa-box"></i> Produits / Services</a></li>
            <li><a href="#" data-tab="announcements"><i class="fas fa-bullhorn"></i> Annonces</a></li>
            <li><a href="#" data-tab="proofs"><i class="fas fa-receipt"></i> Preuves à valider</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent"></div>

    <a href="https://wa.me/50937542954" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <footer><p>© 2025 Fox Store – Administration sécurisée</p></footer>

    <!-- Modale générique -->
    <div class="modal" id="genericModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Titre</h3>
                <button class="close-modal" style="background:none; border:none; font-size:1.5rem;">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ---------- CONFIGURATION FIREBASE ----------
        const firebaseConfig = {
            apiKey: "AIzaSyDSyFdTHBNULuUiacHM6nmEvPb7YpY24UE",
            authDomain: "foxstoreht.firebaseapp.com",
            projectId: "foxstoreht",
            storageBucket: "foxstoreht.firebasestorage.app",
            messagingSenderId: "72533137445",
            appId: "1:72533137445:web:3ba7634bc34da6115b47cc",
            measurementId: "G-X1Q7Q79BRD"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAIL = "foxstorehaiti@gmail.com";

        // ---------- ÉLÉMENTS DOM ----------
        const mainContent = document.getElementById('mainContent');
        const sidebarLinks = document.querySelectorAll('.sidebar-menu a');
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const modal = document.getElementById('genericModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        let currentUser = null;

        // Fermeture modale
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.addEventListener('click', () => modal.classList.remove('active'));
        });
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active'); });

        // Drawer
        function closeDrawer() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); }
        function openDrawer() { sidebar.classList.add('open'); sidebarOverlay.classList.add('active'); }
        burgerBtn?.addEventListener('click', openDrawer);
        sidebarOverlay?.addEventListener('click', closeDrawer);

        // ---------- AUTHENTIFICATION ET REDIRECTION ----------
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = '/login.html'; return; }
            if (user.email !== ADMIN_EMAIL) { window.location.href = '/home.html'; return; }
            currentUser = user;
            loadTab('dashboard');
        });

        // Gestion des onglets
        sidebarLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const tab = link.dataset.tab;
                sidebarLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                loadTab(tab);
                closeDrawer();
            });
        });

        // ---------- CHARGEMENT DYNAMIQUE ----------
        async function loadTab(tabName) {
            mainContent.innerHTML = '<div class="card" style="text-align:center;">Chargement...</div>';
            switch(tabName) {
                case 'dashboard': await renderDashboard(); break;
                case 'orders': await renderOrders(); break;
                case 'users': await renderUsers(); break;
                case 'products': await renderProducts(); break;
                case 'announcements': await renderAnnouncements(); break;
                case 'proofs': await renderProofs(); break;
                default: mainContent.innerHTML = '<div class="card">Section non trouvée</div>';
            }
        }

        // ---------- TABLEAU DE BORD ----------
        async function renderDashboard() {
            const usersSnap = await db.collection('users').get();
            const ordersSnap = await db.collection('orders').get();
            const pendingOrders = ordersSnap.docs.filter(d => d.data().status === 'en-attente').length;
            const totalRevenue = ordersSnap.docs.reduce((sum, doc) => sum + (doc.data().total || doc.data().price || 0), 0);
            const html = `
                <div class="section-title"><i class="fas fa-chart-line"></i> Tableau de bord</div>
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number">${usersSnap.size}</div><div>Utilisateurs</div></div>
                    <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-number">${ordersSnap.size}</div><div>Commandes totales</div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-number">${pendingOrders}</div><div>En attente</div></div>
                    <div class="stat-card"><i class="fas fa-coins"></i><div class="stat-number">${totalRevenue.toLocaleString()} HTG</div><div>CA total</div></div>
                </div>
                <div class="card"><h3>Bienvenue, Administrateur</h3><p>Utilisez le menu pour gérer les commandes, utilisateurs, produits et annonces.</p></div>
            `;
            mainContent.innerHTML = html;
        }

        // ---------- COMMANDES ----------
        async function renderOrders() {
            const ordersSnapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
            let html = `<div class="section-title"><i class="fas fa-shopping-cart"></i> Gestion des commandes</div>
                        <div class="card"><div class="table-responsive"><table><thead><tr><th>ID</th><th>Utilisateur</th><th>Produit</th><th>Montant</th><th>Statut</th><th>Actions</th></tr></thead><tbody>`;
            for (const doc of ordersSnapshot.docs) {
                const order = doc.data();
                const orderId = doc.id.slice(0,8);
                html += `<tr>
                            <td>${orderId}</td>
                            <td>${order.userEmail || 'N/A'}</td>
                            <td>${order.productName || order.serviceName}</td>
                            <td>${order.total || order.price} HTG</td>
                            <td><span class="status-badge status-${order.status.replace('_','-')}">${order.status}</span></td>
                            <td>
                                <button class="btn-sm" onclick="viewOrder('${doc.id}')">Détails</button>
                                <select class="btn-sm" onchange="updateOrderStatus('${doc.id}', this.value)">
                                    <option value="">Changer statut</option>
                                    <option value="en-attente">En attente</option>
                                    <option value="en-cours">En cours</option>
                                    <option value="valide">Validé</option>
                                    <option value="livre">Livré</option>
                                    <option value="rejete">Rejeté</option>
                                    <option value="annule">Annulé</option>
                                </select>
                            </td>
                          </tr>`;
            }
            html += `</tbody></table></div></div>`;
            mainContent.innerHTML = html;
        }

        window.viewOrder = async (orderId) => {
            const doc = await db.collection('orders').doc(orderId).get();
            const order = doc.data();
            const payment = order.payment || {};
            modalTitle.innerText = `Commande ${orderId.slice(0,8)}`;
            modalBody.innerHTML = `
                <div><strong>Service:</strong> ${order.serviceName}</div>
                <div><strong>Produit:</strong> ${order.productName}</div>
                <div><strong>Montant:</strong> ${order.total || order.price} HTG</div>
                <div><strong>Statut:</strong> ${order.status}</div>
                <div><strong>Infos client:</strong> ${JSON.stringify(order.customerInfo)}</div>
                <div><strong>Méthode de paiement:</strong> ${payment.method || 'Non renseigné'}</div>
                ${payment.proofUrl ? `<div><strong>Preuve:</strong> <a href="${payment.proofUrl}" target="_blank">Voir l'image</a></div>` : ''}
                <div class="form-group"><label>Commentaire interne</label><textarea id="adminNote" rows="2"></textarea></div>
                <button class="btn-primary" onclick="saveOrderNote('${orderId}')">Enregistrer note</button>
            `;
            modal.classList.add('active');
        };

        window.updateOrderStatus = async (orderId, newStatus) => {
            if (!newStatus) return;
            await db.collection('orders').doc(orderId).update({
                status: newStatus,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                validatedBy: currentUser.email,
                validatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadTab('orders');
        };

        window.saveOrderNote = async (orderId) => {
            const note = document.getElementById('adminNote').value;
            await db.collection('orders').doc(orderId).update({ adminNote: note });
            modal.classList.remove('active');
            loadTab('orders');
        };

        // ---------- UTILISATEURS ----------
        async function renderUsers() {
            const usersSnapshot = await db.collection('users').get();
            let html = `<div class="section-title"><i class="fas fa-users"></i> Utilisateurs</div>
                        <div class="card"><div class="table-responsive"><table><thead><tr><th>Email</th><th>Nom</th><th>Solde (HTG)</th><th>Banni</th><th>Actions</th></tr></thead><tbody>`;
            for (const doc of usersSnapshot.docs) {
                const user = doc.data();
                const userId = doc.id;
                const balance = user.balance !== undefined ? user.balance : 0;
                const isBanned = user.banned || false;
                html += `<tr>
                            <td>${user.email}</td>
                            <td>${user.displayName || '-'}</td>
                            <td>${balance} HTG</td>
                            <td>${isBanned ? 'Oui' : 'Non'}</td>
                            <td>
                                <button class="btn-sm" onclick="manageBalance('${userId}', '${user.email}')">Créditer/Débiter</button>
                                <button class="btn-sm" onclick="toggleBan('${userId}', ${!isBanned})">${isBanned ? 'Débannir' : 'Bannir'}</button>
                            </td>
                          </tr>`;
            }
            html += `</tbody></table></div></div>`;
            mainContent.innerHTML = html;
        }

        window.manageBalance = (userId, userEmail) => {
            modalTitle.innerText = `Gérer le solde de ${userEmail}`;
            modalBody.innerHTML = `
                <div class="form-group"><label>Montant (HTG)</label><input type="number" id="amount" step="1" placeholder="Ex: 500"></div>
                <div class="form-group"><label>Type</label><select id="transType"><option value="credit">Créditer (+)</option><option value="debit">Débiter (-)</option></select></div>
                <div class="form-group"><label>Motif</label><input type="text" id="reason" placeholder="Ex: Achat, Remboursement"></div>
                <button class="btn-primary" onclick="processBalance('${userId}')">Appliquer</button>
            `;
            modal.classList.add('active');
        };

        window.processBalance = async (userId) => {
            const amount = parseInt(document.getElementById('amount').value);
            const type = document.getElementById('transType').value;
            const reason = document.getElementById('reason').value;
            if (isNaN(amount)) return;
            const userRef = db.collection('users').doc(userId);
            const userDoc = await userRef.get();
            let currentBalance = userDoc.data().balance || 0;
            let newBalance = type === 'credit' ? currentBalance + amount : currentBalance - amount;
            await userRef.update({ balance: newBalance });
            // Enregistrer la transaction
            await db.collection('transactions').add({
                userId: userId,
                amount: type === 'credit' ? amount : -amount,
                type: type,
                reason: reason,
                newBalance: newBalance,
                adminEmail: currentUser.email,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            modal.classList.remove('active');
            loadTab('users');
        };

        window.toggleBan = async (userId, ban) => {
            await db.collection('users').doc(userId).update({ banned: ban });
            loadTab('users');
        };

        // ---------- PRODUITS / SERVICES ----------
        async function renderProducts() {
            const productsSnap = await db.collection('products').get();
            let html = `<div class="section-title"><i class="fas fa-box"></i> Produits et services</div>
                        <div class="card"><div class="table-responsive"><table><thead><tr><th>Nom</th><th>Catégorie</th><th>Prix (HTG)</th><th>Actif</th><th>Action</th></tr></thead><tbody>`;
            productsSnap.forEach(doc => {
                const p = doc.data();
                html += `<tr>
                            <td>${p.name}</td>
                            <td>${p.category}</td>
                            <td>${p.price}</td>
                            <td>${p.active ? 'Oui' : 'Non'}</td>
                            <td><button class="btn-sm" onclick="toggleProductActive('${doc.id}', ${!p.active})">${p.active ? 'Désactiver' : 'Activer'}</button></td>
                          </tr>`;
            });
            html += `</tbody></table></div><button class="btn-primary" style="margin-top:16px;" onclick="showAddProductForm()">+ Ajouter un produit</button></div>`;
            mainContent.innerHTML = html;
        }

        window.toggleProductActive = async (productId, newState) => {
            await db.collection('products').doc(productId).update({ active: newState });
            loadTab('products');
        };

        window.showAddProductForm = () => {
            modalTitle.innerText = "Ajouter un produit/service";
            modalBody.innerHTML = `
                <div class="form-group"><label>Nom</label><input id="prodName" placeholder="Ex: 100 Diamants"></div>
                <div class="form-group"><label>Catégorie</label><select id="prodCat"><option value="gaming">Gaming</option><option value="streaming">Streaming</option><option value="finance">Finance</option></select></div>
                <div class="form-group"><label>Prix (HTG)</label><input id="prodPrice" type="number" step="1"></div>
                <div class="form-group"><label>Jeu/Service (optionnel)</label><input id="prodGame" placeholder="Free Fire, Netflix..."></div>
                <button class="btn-primary" onclick="addProduct()">Ajouter</button>
            `;
            modal.classList.add('active');
        };

        window.addProduct = async () => {
            const name = document.getElementById('prodName').value;
            const category = document.getElementById('prodCat').value;
            const price = parseInt(document.getElementById('prodPrice').value);
            const game = document.getElementById('prodGame').value;
            if (!name || isNaN(price)) return;
            await db.collection('products').add({
                name: name,
                category: category,
                price: price,
                game: game,
                active: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            modal.classList.remove('active');
            loadTab('products');
        };

        // ---------- ANNONCES ----------
        async function renderAnnouncements() {
            const annonceSnap = await db.collection('announcements').orderBy('createdAt', 'desc').get();
            let html = `<div class="section-title"><i class="fas fa-bullhorn"></i> Annonces</div>
                        <div class="card"><button class="btn-primary" onclick="showAddAnnouncementForm()">+ Nouvelle annonce</button></div>`;
            annonceSnap.forEach(doc => {
                const a = doc.data();
                html += `<div class="card">
                            <h3>${a.title}</h3>
                            <p>${a.content}</p>
                            <small>${a.createdAt ? a.createdAt.toDate().toLocaleString() : ''}</small><br>
                            <button class="btn-sm" onclick="deleteAnnouncement('${doc.id}')">Supprimer</button>
                         </div>`;
            });
            mainContent.innerHTML = html;
        }

        window.showAddAnnouncementForm = () => {
            modalTitle.innerText = "Nouvelle annonce";
            modalBody.innerHTML = `
                <div class="form-group"><label>Titre</label><input id="annTitle"></div>
                <div class="form-group"><label>Contenu</label><textarea id="annContent" rows="4"></textarea></div>
                <button class="btn-primary" onclick="publishAnnouncement()">Publier</button>
            `;
            modal.classList.add('active');
        };

        window.publishAnnouncement = async () => {
            const title = document.getElementById('annTitle').value;
            const content = document.getElementById('annContent').value;
            if (!title || !content) return;
            await db.collection('announcements').add({
                title: title,
                content: content,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                adminEmail: currentUser.email
            });
            modal.classList.remove('active');
            loadTab('announcements');
        };

        window.deleteAnnouncement = async (id) => {
            await db.collection('announcements').doc(id).delete();
            loadTab('announcements');
        };

        // ---------- PREUVES À VALIDER ----------
        async function renderProofs() {
            const ordersSnap = await db.collection('orders').where('payment.proofUrl', '!=', null).get();
            let html = `<div class="section-title"><i class="fas fa-receipt"></i> Preuves de paiement à valider</div>`;
            let hasProof = false;
            for (const doc of ordersSnap.docs) {
                const order = doc.data();
                if (order.payment && order.payment.proofUrl) {
                    hasProof = true;
                    html += `<div class="card">
                                <p><strong>Commande:</strong> ${doc.id.slice(0,8)}</p>
                                <p><strong>Utilisateur:</strong> ${order.userEmail}</p>
                                <p><strong>Montant:</strong> ${order.total || order.price} HTG</p>
                                <p><strong>Méthode:</strong> ${order.payment.method}</p>
                                <a href="${order.payment.proofUrl}" target="_blank"><img src="${order.payment.proofUrl}" class="proof-img" style="max-height:150px;"></a>
                                <div style="margin-top:12px;">
                                    <button class="btn-primary" onclick="validateProof('${doc.id}', 'valide')">Valider</button>
                                    <button class="btn-danger" onclick="validateProof('${doc.id}', 'rejete')">Rejeter</button>
                                </div>
                            </div>`;
                }
            }
            if (!hasProof) html += `<div class="card">Aucune preuve en attente de validation.</div>`;
            mainContent.innerHTML = html;
        }

        window.validateProof = async (orderId, newStatus) => {
            await db.collection('orders').doc(orderId).update({
                status: newStatus,
                validatedBy: currentUser.email,
                validatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadTab('proofs');
        };

        // ---------- DÉCONNEXION ----------
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await auth.signOut();
            window.location.href = '/login.html';
        });
    </script>
</body>
</html>
