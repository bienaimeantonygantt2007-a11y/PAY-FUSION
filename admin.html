<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Admin — Panel de Contrôle Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #06070a; --bg-card: #0f121a; --accent: #00d1ff; --white: #ffffff;
            --muted: #8e95a2; --success: #00ff88; --error: #ff4444; --border: rgba(255,255,255,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-deep); color: white; display: flex; font-size: 13px; }

        /* --- SIDEBAR MOBILE FIXED --- */
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100vh; background: var(--bg-card); border-right: 1px solid var(--border); z-index: 5000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 4000; display: none; }
        .overlay.active { display: block; }

        .nav-btn { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: var(--muted); text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); background: rgba(255,255,255,0.02); }
        .nav-btn.active { border-right: 3px solid var(--accent); background: rgba(0, 209, 255, 0.05); }

        /* --- MAIN LAYOUT --- */
        .main { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { height: 55px; padding: 0 15px; background: rgba(15,18,26,0.9); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top:0; z-index: 1000; }
        
        .menu-icon { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; border: 1px solid var(--border); border-radius: 8px; }

        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .kpi-card { background: var(--bg-card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); position: relative; }
        .kpi-card span { font-size: 0.55rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .kpi-card h3 { font-size: 1rem; margin-top: 5px; color: #fff; font-weight: 800; }

        .section-card { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); margin: 0 15px 20px; overflow: hidden; }
        .card-head { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; }

        /* --- LIST ROWS --- */
        .row { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .row-info h5 { font-size: 0.8rem; font-weight: 700; color: #fff; }
        .row-info p { font-size: 0.65rem; color: var(--muted); }
        
        .btn-lite { padding: 6px 12px; border-radius: 6px; border: none; font-weight: 800; font-size: 0.6rem; cursor: pointer; background: var(--accent); color: var(--bg-deep); }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; }
        .badge-wa { background: rgba(255, 187, 51, 0.1); color: var(--warning); }
        .badge-ok { background: rgba(0, 255, 136, 0.1); color: var(--success); }

        /* --- MODAL ELITE --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: flex-end; }
        .modal-box { background: var(--bg-card); width: 100%; border-radius: 25px 25px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
        .detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .detail-cell label { font-size: 0.5rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .detail-cell p { font-size: 0.8rem; font-weight: 700; }
        .proof-img { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid var(--border); }

        .input-dark { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 0.8rem; margin-top: 10px; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .action-btn { padding: 12px; border-radius: 10px; border: none; font-weight: 800; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }

        @media (min-width: 1025px) { .sidebar { left: 0; } .main { margin-left: 260px; } .menu-icon { display: none; } .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand"><img src="/assets/logos/payfusion-logo.png"><h2>FOX COMMAND</h2></div>
        <div class="nav-menu">
            <div class="nav-btn active" onclick="showTab('orders', this)"><i class="fas fa-list"></i> Commandes</div>
            <div class="nav-btn" onclick="showTab('users', this)"><i class="fas fa-users"></i> Clients</div>
            <div class="nav-btn" onclick="showTab('cms', this)"><i class="fas fa-toggle-on"></i> CMS Services</div>
            <div class="nav-btn" onclick="showTab('chat', this)"><i class="fas fa-comment-dots"></i> Support</div>
        </div>
        <a href="/home.html" class="nav-btn" style="margin-top:auto; border-top:1px solid var(--border);"><i class="fas fa-store"></i> Boutique</a>
    </div>

    <div class="main">
        <header>
            <div class="menu-icon" onclick="toggleSidebar()"><i class="fas fa-bars-staggered"></i></div>
            <div class="header-title" id="tabTitle">Commandes</div>
            <div class="badge badge-ok">Elite Sync</div>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><span>Chiffre Affaires</span><h3 id="statRev">0 HTG</h3></div>
            <div class="kpi-card"><span>Bénéfice Net</span><h3 id="statProfit" style="color:var(--success)">0 HTG</h3></div>
            <div class="kpi-card"><span>Total</span><h3 id="statCount">0</h3></div>
            <div class="kpi-card"><span>En Attente</span><h3 id="statPending" style="color:var(--warning)">0</h3></div>
        </div>

        <!-- SECTION COMMANDES -->
        <section id="ordersTab" class="admin-tab">
            <div class="section-card">
                <div class="card-head">Flux Transactions</div>
                <div id="ordersList"></div>
            </div>
        </section>

        <!-- SECTION UTILISATEURS -->
        <section id="usersTab" class="admin-tab" style="display:none">
            <div class="section-card"><div class="card-head">Membres</div><div id="usersList"></div></div>
        </section>

        <!-- SECTION CMS -->
        <section id="cmsTab" class="admin-tab" style="display:none">
            <div class="kpi-grid" id="cmsGrid"></div>
        </section>

        <!-- SECTION CHAT -->
        <section id="chatTab" class="admin-tab" style="display:none">
            <div class="section-card"><div id="chatUsersList"></div></div>
        </section>
    </div>

    <!-- MODAL COMMANDE -->
    <div class="modal" id="orderModal">
        <div class="modal-box">
            <i class="fas fa-times" onclick="closeModal()" style="float:right; cursor:pointer; color:var(--muted);"></i>
            <h3 style="font-size:1rem; font-weight:800; color:var(--accent);">Détails Transaction</h3>
            <div class="detail-row" id="modalData"></div>
            <img id="proofImg" class="proof-img" onclick="window.open(this.src)">
            <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:15px;">
                <label style="font-size:0.55rem; font-weight:800; color:var(--accent);">Coût d'achat (HTG)</label>
                <input type="number" id="purchaseCost" class="input-dark" placeholder="Ex: 150">
                <div class="btn-group">
                    <button class="action-btn" style="background:var(--success); color:black;" onclick="setStatus('Validé')">Valider</button>
                    <button class="action-btn" style="background:var(--error); color:white;" onclick="setStatus('Rejeté')">Rejeter</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();
        let orders = [], activeID = null;

        auth.onAuthStateChanged(user => {
            if(!user || user.email !== "bmarcco4412@gmail.com") window.location.href = "/login.html";
            else init();
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        
        function showTab(id, el) {
            document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + 'Tab').style.display = 'block';
            el.classList.add('active'); document.getElementById('tabTitle').textContent = el.textContent.trim();
            if(window.innerWidth < 1025) toggleSidebar();
        }

        function init() {
            // Orders Engine
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('ordersList'); list.innerHTML = '';
                let rev = 0, prof = 0, pend = 0; orders = [];
                snap.forEach(doc => {
                    const o = doc.data(); const id = doc.id; orders.push({id, ...o});
                    if(o.status === 'en-attente') pend++;
                    if(o.status === 'Validé') { 
                        rev += o.service.price; 
                        prof += (o.service.price - (o.purchaseCost || 0)); 
                    }
                    list.innerHTML += `<div class="row"><div class="row-info"><h5>#${o.orderId}</h5><p>${o.service.name} ● ${o.service.product}</p></div><div style="text-align:right"><span class="badge ${o.status === 'en-attente'?'badge-wa':'badge-ok'}">${o.status}</span><br><button class="btn-lite" onclick="openOrder('${id}')" style="margin-top:5px">GÉRER</button></div></div>`;
                });
                document.getElementById('statRev').textContent = rev.toLocaleString() + " HTG";
                document.getElementById('statProfit').textContent = prof.toLocaleString() + " HTG";
                document.getElementById('statCount').textContent = snap.size;
                document.getElementById('statPending').textContent = pend;
            });

            // Users Engine
            db.collection("users").onSnapshot(snap => {
                const list = document.getElementById('usersList'); list.innerHTML = '';
                snap.forEach(doc => {
                    const u = doc.data(); const ban = u.status === 'Banni';
                    list.innerHTML += `<div class="row"><div class="row-info"><h5>${u.personalInfo.fullName}</h5><p>${u.personalInfo.email}</p></div><button class="btn-lite" style="background:${ban?var(--success):var(--error)}" onclick="toggleBan('${doc.id}','${u.status}')">${ban?'ACTIVER':'BANNIR'}</button></div>`;
                });
            });

            // CMS Engine
            const svcs = ['Free Fire', 'Netflix', 'Disney+', 'PayPal', 'Wise', 'USDT', 'FC Mobile', 'eFootball'];
            db.collection("cms_services").onSnapshot(snap => {
                const grid = document.getElementById('cmsGrid'); grid.innerHTML = '';
                const states = {}; snap.forEach(d => states[d.id] = d.data().active);
                svcs.forEach(s => {
                    const active = states[s] !== false;
                    grid.innerHTML += `<div class="kpi-card" style="display:flex; justify-content:space-between; align-items:center;"><div><span>SERVICE</span><h4 style="font-size:0.75rem">${s}</h4></div><label class="switch"><input type="checkbox" ${active?'checked':''} onchange="setCMS('${s}', this.checked)"><span class="slider"></span></label></div>`;
                });
            });
        }

        function openOrder(id) {
            activeID = id; const o = orders.find(x => x.id === id);
            const body = document.getElementById('modalData'); body.innerHTML = '';
            const data = { "WhatsApp": o.customerInfo.whatsapp, "ID/Email": o.customerInfo.gameId || o.customerInfo.email, "Montant": o.service.price + " HTG", "Paiement": o.payment.method, "Expéditeur": o.payment.senderName };
            for(let [l,v] of Object.entries(data)) body.innerHTML += `<div class="detail-cell"><label>${l}</label><p>${v}</p></div>`;
            document.getElementById('proofImg').src = o.payment.proof;
            document.getElementById('purchaseCost').value = o.purchaseCost || '';
            document.getElementById('orderModal').style.display = 'flex';
        }

        async function setStatus(s) { 
            const cost = parseFloat(document.getElementById('purchaseCost').value) || 0;
            await db.collection("orders").doc(activeID).update({ status: s, purchaseCost: cost }); 
            closeModal(); 
        }

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        function toggleBan(id, s) { db.collection("users").doc(id).update({ status: s === 'Banni' ? 'Actif' : 'Banni' }); }
        function setCMS(id, val) { db.collection("cms_services").doc(id).set({ active: val }, { merge: true }); }
    </script>
</body>
</html>
