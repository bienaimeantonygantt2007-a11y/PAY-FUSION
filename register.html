<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Inscription – Fox Store</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #f8fafc;
            --bg-card: #ffffff;
            --bg-surface: #f1f5f9;
            --accent: #00d1ff;
            --accent-dark: #00b8e6;
            --text-main: #0a0c10;
            --text-muted: #4a5568;
            --text-tertiary: #6c757d;
            --error: #ff4444;
            --success: #00ff88;
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-deep) 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            max-width: 480px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-family: 'Clash Display', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
        }

        .logo i {
            font-size: 32px;
            color: var(--accent);
        }

        .card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--glass-border);
        }

        .card h1 {
            font-family: 'Clash Display', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .card-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 1.5px solid var(--glass-border);
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            background: var(--bg-deep);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 209, 255, 0.1);
        }

        .input-wrapper input.error {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 20px 0;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .checkbox-group label {
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .checkbox-group a {
            color: var(--accent);
            text-decoration: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0c10;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 209, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            background: var(--bg-deep);
            border: 1.5px solid var(--glass-border);
            color: var(--text-main);
            margin-top: 16px;
        }

        .btn-google:hover {
            background: var(--bg-surface);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .divider span {
            padding: 0 12px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-main);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: var(--error);
        }

        .toast.success {
            background: var(--success);
            color: var(--text-main);
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
            .card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <a href="/">
                <i class="fas fa-fox"></i>
                <span>FOX STORE</span>
            </a>
        </div>

        <div class="card">
            <h1>Inscription</h1>
            <p class="card-subtitle">Créez votre compte Fox Store</p>

            <form id="register-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="Jean Dupont" required>
                    </div>
                    <div class="error-message" id="fullName-error"></div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="votre@email.com" required>
                    </div>
                    <div class="error-message" id="email-error"></div>
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="error-message" id="password-error"></div>
                </div>

                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                    <div class="error-message" id="confirmPassword-error"></div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        J'accepte les <a href="#">conditions d'utilisation</a> et la 
                        <a href="#">politique de confidentialité</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">
                    <i class="fas fa-user-plus"></i>
                    S'inscrire
                </button>
            </form>

            <div class="divider">
                <span>ou</span>
            </div>

            <button class="btn btn-google" id="google-btn">
                <i class="fab fa-google"></i>
                S'inscrire avec Google
            </button>

            <div class="login-link">
                Déjà un compte ? <a href="login.html">Se connecter</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="firebase-config.js"></script>
    <script>
        // Éléments DOM
        const form = document.getElementById('register-form');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const termsCheckbox = document.getElementById('terms');
        const registerBtn = document.getElementById('register-btn');
        const googleBtn = document.getElementById('google-btn');
        const toast = document.getElementById('toast');

        // Afficher une notification
        function showToast(message, type = 'error') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // Afficher une erreur de champ
        function showFieldError(fieldId, message) {
            const errorDiv = document.getElementById(`${fieldId}-error`);
            const input = document.getElementById(fieldId);
            if (message) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                input.classList.add('error');
            } else {
                errorDiv.classList.remove('show');
                input.classList.remove('error');
            }
        }

        // Valider le formulaire
        function validateForm() {
            let isValid = true;
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!fullName) {
                showFieldError('fullName', 'Le nom complet est requis');
                isValid = false;
            } else if (fullName.length < 2) {
                showFieldError('fullName', 'Nom trop court');
                isValid = false;
            } else {
                showFieldError('fullName', '');
            }

            if (!email) {
                showFieldError('email', 'L\'email est requis');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showFieldError('email', 'Email invalide');
                isValid = false;
            } else {
                showFieldError('email', '');
            }

            if (!password) {
                showFieldError('password', 'Le mot de passe est requis');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('password', 'Minimum 6 caractères');
                isValid = false;
            } else {
                showFieldError('password', '');
            }

            if (!confirmPassword) {
                showFieldError('confirmPassword', 'Confirmation requise');
                isValid = false;
            } else if (password !== confirmPassword) {
                showFieldError('confirmPassword', 'Les mots de passe ne correspondent pas');
                isValid = false;
            } else {
                showFieldError('confirmPassword', '');
            }

            if (!termsCheckbox.checked) {
                showToast('Vous devez accepter les conditions d\'utilisation', 'error');
                isValid = false;
            }

            return isValid;
        }

        // Inscription email/password
        async function registerWithEmail(fullName, email, password) {
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription...';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Mettre à jour le profil
                await user.updateProfile({ displayName: fullName });

                // Créer le document utilisateur dans Firestore
                await db.collection('users').doc(user.uid).set({
                    userId: user.uid,
                    email: email,
                    displayName: fullName,
                    photoURL: null,
                    role: 'user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });

                showToast('Compte créé avec succès !', 'success');
                
                // Redirection vers login
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);

            } catch (error) {
                console.error(error);
                let message = 'Une erreur est survenue';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        message = 'Cet email est déjà utilisé';
                        break;
                    case 'auth/invalid-email':
                        message = 'Email invalide';
                        break;
                    case 'auth/weak-password':
                        message = 'Mot de passe trop faible (min 6 caractères)';
                        break;
                    default:
                        message = error.message;
                }
                showToast(message, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
            }
        }

        // Inscription Google
        async function registerWithGoogle() {
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription...';

            try {
                const result = await auth.signInWithPopup(googleProvider);
                const user = result.user;

                // Vérifier si l'utilisateur existe déjà
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        userId: user.uid,
                        email: user.email,
                        displayName: user.displayName,
                        photoURL: user.photoURL,
                        role: user.email === 'foxstorehaiti@gmail.com' ? 'admin' : 'user',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                showToast('Inscription réussie !', 'success');
                
                setTimeout(() => {
                    if (user.email === 'foxstorehaiti@gmail.com') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/home.html';
                    }
                }, 500);

            } catch (error) {
                console.error(error);
                let message = 'Erreur d\'inscription Google';
                if (error.code === 'auth/popup-blocked') {
                    message = 'Popup bloquée, autorisez les popups';
                } else if (error.code === 'auth/account-exists-with-different-credential') {
                    message = 'Un compte existe déjà avec cet email';
                }
                showToast(message, 'error');
                googleBtn.disabled = false;
                googleBtn.innerHTML = '<i class="fab fa-google"></i> S\'inscrire avec Google';
            }
        }

        // Vérifier si déjà connecté
        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.email === 'foxstorehaiti@gmail.com') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/home.html';
                }
            }
        });

        // Événements
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (validateForm()) {
                registerWithEmail(
                    fullNameInput.value.trim(),
                    emailInput.value.trim(),
                    passwordInput.value
                );
            }
        });

        googleBtn.addEventListener('click', registerWithGoogle);
    </script>
</body>
</html>
