<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fox Store – Streaming</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fc;
            color: #1e293b;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eef2ff;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.5rem;
            color: #0f172a;
        }
        .logo i { font-size: 1.6rem; color: #00d1ff; }
        .burger-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }
        .burger-btn:hover { background: white; border-color: #00d1ff40; color: #00d1ff; }
        .drawer {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 24px rgba(0,0,0,0.05);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #eef2ff;
        }
        .drawer.open { right: 0; }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #edf2f7;
        }
        .drawer-header .logo { font-size: 1.2rem; }
        .close-drawer {
            background: #f1f5f9;
            border: none;
            border-radius: 10px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            font-size: 1rem;
        }
        .drawer-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #f8fafc;
            margin: 16px;
            border-radius: 16px;
        }
        .drawer-user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #00d1ff, #009ac7);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .drawer-user-info h4 { font-size: 0.95rem; font-weight: 600; }
        .drawer-user-info p { font-size: 0.75rem; color: #5b6e8c; }
        .drawer-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 12px;
            gap: 4px;
        }
        .drawer-nav a, .drawer-nav button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            text-decoration: none;
            color: #1e293b;
            font-size: 0.95rem;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }
        .drawer-nav a i, .drawer-nav button i { width: 22px; color: #5b6e8c; }
        .drawer-nav a:hover, .drawer-nav button:hover { background: #f1f5f9; }
        .drawer-nav a:hover i, .drawer-nav button:hover i { color: #00d1ff; }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            z-index: 1999;
            display: none;
        }
        .drawer-overlay.active { display: block; }
        .main-content {
            flex: 1;
            padding: 90px 24px 50px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .page-header p { color: #475569; font-size: 1rem; }
        .streaming-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        .stream-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eef2ff;
            transition: all 0.2s;
            text-align: center;
        }
        .stream-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.04);
            border-color: #e2e8f0;
        }
        .stream-logo {
            width: 100px;
            height: 100px;
            background: #f1f5f9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .stream-logo img {
            max-width: 80px;
            max-height: 80px;
            object-fit: contain;
        }
        .stream-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .stream-card p { font-size: 0.85rem; color: #5b6e8c; }
        footer {
            background: transparent;
            border-top: 1px solid #e2e8f0;
            padding: 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #5b6e8c;
        }
        @media (max-width: 640px) {
            .main-content { padding: 80px 16px 40px; }
            .streaming-grid { grid-template-columns: 1fr; }
            .drawer { width: 260px; right: -260px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/home.html" class="logo"><i class="fas fa-fox"></i><span>FOX STORE</span></a>
            <button class="burger-btn" id="burgerBtn"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <div class="logo"><i class="fas fa-fox"></i><span>Menu</span></div>
            <button class="close-drawer" id="closeDrawerBtn"><i class="fas fa-times"></i></button>
        </div>
        <div id="drawerUserSection"></div>
        <div class="drawer-nav" id="drawerNav"></div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Streaming 4K</h1>
            <p>Comptes Premium – Netflix, Disney+, Prime Video, Crunchyroll</p>
        </div>
        <div class="streaming-grid">
            <a href="/pages/products/netflix.html" class="stream-card">
                <div class="stream-logo"><img src="/assets/logos/netflix-logo.png" alt="Netflix"></div>
                <h3>Netflix</h3>
                <p>Abonnement 4K</p>
            </a>
            <a href="/pages/products/disneyplus.html" class="stream-card">
                <div class="stream-logo"><img src="/assets/logos/disneyplus-logo.png" alt="Disney+"></div>
                <h3>Disney+</h3>
                <p>Premium</p>
            </a>
            <a href="/pages/products/primevideo.html" class="stream-card">
                <div class="stream-logo"><img src="/assets/logos/primevideo-logo.png" alt="Prime Video"></div>
                <h3>Prime Video</h3>
                <p>Amazon Prime</p>
            </a>
            <a href="/pages/products/crunchyroll.html" class="stream-card">
                <div class="stream-logo"><img src="/assets/logos/crunchyroll-logo.png" alt="Crunchyroll"></div>
                <h3>Crunchyroll</h3>
                <p>Anime Premium</p>
            </a>
        </div>
    </div>

    <footer>
        <p>© 2025 Fox Store – L'élite du service digital</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSyFdTHBNULuUiacHM6nmEvPb7YpY24UE",
            authDomain: "foxstoreht.firebaseapp.com",
            projectId: "foxstoreht",
            storageBucket: "foxstoreht.firebasestorage.app",
            messagingSenderId: "72533137445",
            appId: "1:72533137445:web:3ba7634bc34da6115b47cc",
            measurementId: "G-X1Q7Q79BRD"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const drawerNav = document.getElementById('drawerNav');
        const drawerUserSection = document.getElementById('drawerUserSection');
        const burgerBtn = document.getElementById('burgerBtn');
        const drawer = document.getElementById('drawer');
        const drawerOverlay = document.getElementById('drawerOverlay');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const ADMIN_EMAIL = "foxstorehaiti@gmail.com";

        function closeDrawer() { drawer.classList.remove('open'); drawerOverlay.classList.remove('active'); }
        function openDrawer() { drawer.classList.add('open'); drawerOverlay.classList.add('active'); }
        burgerBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        drawerOverlay.addEventListener('click', closeDrawer);

        function updateUI(user) {
            if (!user) { window.location.href = '/login.html'; return; }
            const name = user.displayName || user.email || 'Client';
            const isAdmin = (user.email === ADMIN_EMAIL);
            const initial = name.charAt(0).toUpperCase();
            drawerUserSection.innerHTML = `
                <div class="drawer-user">
                    <div class="drawer-user-avatar">${initial}</div>
                    <div class="drawer-user-info">
                        <h4>${name}</h4>
                        <p>${user.email}</p>
                    </div>
                </div>
            `;
            let menu = `
                <a href="/home.html"><i class="fas fa-home"></i> Accueil</a>
                <a href="/gaming.html"><i class="fas fa-gamepad"></i> Gaming</a>
                <a href="/streaming.html"><i class="fas fa-film"></i> Streaming</a>
                <a href="/finance.html"><i class="fas fa-coins"></i> Finance</a>
                <a href="/orders.html"><i class="fas fa-shopping-cart"></i> Commandes</a>
                <a href="/user/account.html"><i class="fas fa-user"></i> Mon compte</a>
                <a href="/user/settings.html"><i class="fas fa-sliders-h"></i> Paramètres</a>
                <a href="/user/supports.html"><i class="fas fa-headset"></i> Support</a>
            `;
            if (isAdmin) menu += `<a href="/admin.html"><i class="fas fa-shield-alt"></i> Administration</a>`;
            menu += `<button id="drawerLogoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>`;
            drawerNav.innerHTML = menu;
            document.getElementById('drawerLogoutBtn')?.addEventListener('click', async () => {
                await auth.signOut();
                window.location.href = '/login.html';
            });
        }
        auth.onAuthStateChanged(updateUI);
    </script>
</body>
</html>
