<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fox Store – Streaming 4K</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fc;
            color: #1e293b;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 16px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eef2ff;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.3rem;
            color: #0f172a;
        }
        .logo i { font-size: 1.4rem; color: #00d1ff; }
        .burger-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .burger-btn:hover { background: white; border-color: #00d1ff40; color: #00d1ff; }
        .drawer {
            position: fixed;
            top: 0;
            right: -260px;
            width: 260px;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 24px rgba(0,0,0,0.05);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #eef2ff;
        }
        .drawer.open { right: 0; }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            border-bottom: 1px solid #edf2f7;
        }
        .drawer-header .logo { font-size: 1.1rem; }
        .close-drawer {
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .drawer-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: #f8fafc;
            margin: 14px;
            border-radius: 14px;
        }
        .drawer-user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d1ff, #009ac7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .drawer-user-info h4 { font-size: 0.85rem; font-weight: 600; }
        .drawer-user-info p { font-size: 0.7rem; color: #5b6e8c; }
        .drawer-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 12px;
            gap: 4px;
        }
        .drawer-nav a, .drawer-nav button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: #1e293b;
            font-size: 0.9rem;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }
        .drawer-nav a i, .drawer-nav button i { width: 20px; font-size: 1rem; color: #5b6e8c; }
        .drawer-nav a:hover, .drawer-nav button:hover { background: #f1f5f9; }
        .drawer-nav a:hover i, .drawer-nav button:hover i { color: #00d1ff; }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            z-index: 1999;
            display: none;
        }
        .drawer-overlay.active { display: block; }
        .main-content {
            flex: 1;
            padding: 80px 12px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f172a, #00d1ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .page-header p {
            color: #475569;
            font-size: 0.9rem;
        }
        .streaming-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .stream-card {
            background: white;
            border-radius: 24px;
            padding: 20px 12px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eef2ff;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stream-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            border-color: #cbd5e1;
        }
        .stream-logo {
            width: 180px;
            height: 180px;
            background: #f8fafc;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .stream-card:hover .stream-logo { transform: scale(1.02); }
        .stream-logo img {
            max-width: 140px;
            max-height: 140px;
            object-fit: contain;
        }
        .stream-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .stream-card p {
            font-size: 0.75rem;
            color: #5b6e8c;
        }
        footer {
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            padding: 32px 16px 24px;
            margin-top: 40px;
        }
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        .footer-col h4 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #0f172a;
        }
        .footer-col ul {
            list-style: none;
        }
        .footer-col ul li {
            margin-bottom: 8px;
        }
        .footer-col ul li a {
            color: #5b6e8c;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s;
        }
        .footer-col ul li a:hover { color: #00d1ff; }
        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            margin-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.7rem;
            color: #5b6e8c;
        }
        @media (min-width: 768px) {
            .navbar { padding: 14px 24px; }
            .logo { font-size: 1.5rem; }
            .logo i { font-size: 1.6rem; }
            .burger-btn { width: 44px; height: 44px; font-size: 1.3rem; }
            .main-content { padding: 100px 24px 60px; }
            .page-header h1 { font-size: 2.5rem; }
            .page-header p { font-size: 1.1rem; }
            .streaming-grid { gap: 30px; }
            .stream-card { padding: 28px 20px; border-radius: 28px; }
            .stream-logo { width: 240px; height: 240px; border-radius: 40px; margin-bottom: 20px; }
            .stream-logo img { max-width: 200px; max-height: 200px; }
            .stream-card h3 { font-size: 1.3rem; }
            .stream-card p { font-size: 0.85rem; }
            .footer-container { grid-template-columns: repeat(4, 1fr); gap: 32px; }
            .footer-col h4 { font-size: 1rem; }
            .footer-col ul li a { font-size: 0.85rem; }
        }
        @media (min-width: 1024px) {
            .streaming-grid { gap: 40px; }
        }
    </style>
</head>

        <div class="nav-container">

        </div>
    </nav>
