<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fox Store – Connexion</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Mêmes styles que register.html (thème clair) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #f8fafc;
            --bg-card: #ffffff;
            --bg-surface: #f1f5f9;
            --accent: #00d1ff;
            --text-main: #0a0c10;
            --text-muted: #4a5568;
            --text-tertiary: #6c757d;
            --glass-border: rgba(0, 0, 0, 0.08);
            --error: #ff4444;
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-main);
            font-family: 'Clash Display', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo i {
            font-size: 22px;
            color: var(--accent);
            transition: var(--transition);
        }

        .logo:hover i {
            transform: scale(1.1);
        }

        .btn {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            border: 1.5px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: transparent;
            color: var(--text-main);
        }

        .btn-outline {
            border-color: var(--glass-border);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            background: rgba(0, 209, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0c10;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 209, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 209, 255, 0.5);
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow-md);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-family: 'Clash Display', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-tertiary);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 14px 20px 14px 48px;
            color: var(--text-main);
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 209, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            justify-content: center;
            margin-bottom: 20px;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-tertiary);
            font-size: 12px;
            margin: 20px 0;
        }

        .separator-line {
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            background: transparent;
            border: 1.5px solid var(--glass-border);
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-google:hover {
            border-color: var(--accent);
            background: rgba(0, 209, 255, 0.05);
            transform: translateY(-2px);
        }

        .btn-google i {
            color: var(--accent);
            font-size: 18px;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 40px;
            padding: 10px 16px;
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }
        .forgot-password a {
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
        }
        .forgot-password a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fas fa-fox"></i>
                <span>FOX STORE</span>
            </a>
            <div class="nav-buttons">
                <a href="/register.html" class="btn btn-outline">
                    <span>Inscription</span>
                    <i class="fas fa-user-plus"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="login-card">
            <div class="login-header">
                <h1>Connexion</h1>
                <p>Accédez à votre compte Fox Store</p>
            </div>

            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" id="email" placeholder="exemple@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="forgot-password">
                    <a href="#">Mot de passe oublié ?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-login">
                    <span>Se connecter</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="separator">
                <span class="separator-line"></span>
                <span>ou</span>
                <span class="separator-line"></span>
            </div>

            <button class="btn-google" id="googleLoginBtn">
                <i class="fab fa-google"></i>
                <span>Se connecter avec Google</span>
            </button>

            <div class="register-link">
                Pas encore de compte ?<a href="/register.html">S'inscrire</a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://gjnnsfbsfaxmfjmkgoyw.supabase.co';
        const supabaseAnonKey = 'sb_publishable_dlZEgaJnsbzwe_mOyIVJoQ_dLao6nju';
        const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');
        const googleBtn = document.getElementById('googleLoginBtn');

        function showError(message) {
            errorDiv.style.display = 'flex';
            errorDiv.querySelector('span').textContent = message;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Veuillez remplir tous les champs.');
                return;
            }

            try {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = '/home.html';
            } catch (error) {
                console.error(error);
                showError('Email ou mot de passe incorrect.');
            }
        });

        googleBtn.addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/home.html'
                    }
                });
                if (error) throw error;
            } catch (error) {
                showError('Erreur lors de la connexion avec Google.');
            }
        });

        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = '/home.html';
            }
        });
    </script>
</body>
</html>
