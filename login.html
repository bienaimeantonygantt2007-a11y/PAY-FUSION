<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fox Store – Connexion</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #06070a;
            --bg-card: #0f121a;
            --bg-surface: #151a22;
            --accent: #00d1ff;
            --text-main: #ffffff;
            --text-muted: #8e95a2;
            --text-tertiary: #5f6b7a;
            --glass-border: rgba(255, 255, 255, 0.05);
            --error: #ff4444;
            --success: #00ff88;
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 14px 20px;
            background: rgba(6, 7, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-main);
            font-family: 'Clash Display', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo i {
            font-size: 22px;
            color: var(--accent);
            transition: var(--transition);
        }

        .logo:hover i {
            transform: scale(1.1);
        }

        .btn {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            border: 1.5px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: transparent;
            color: var(--text-main);
        }

        .btn-outline {
            border-color: var(--glass-border);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            background: rgba(0, 209, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-deep);
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 209, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 209, 255, 0.5);
        }

        /* Main content */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-family: 'Clash Display', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-tertiary);
            font-size: 16px;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 14px 20px 14px 48px;
            color: var(--text-main);
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 209, 255, 0.2);
        }

        .input-wrapper input::placeholder {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            justify-content: center;
            margin-bottom: 20px;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-tertiary);
            font-size: 12px;
            margin: 20px 0;
        }

        .separator-line {
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            background: transparent;
            border: 1.5px solid var(--glass-border);
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-google:hover {
            border-color: var(--accent);
            background: rgba(0, 209, 255, 0.05);
            transform: translateY(-2px);
        }

        .btn-google i {
            color: var(--accent);
            font-size: 18px;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 40px;
            padding: 10px 16px;
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message i {
            font-size: 14px;
        }

        .success-message {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 40px;
            padding: 10px 16px;
            color: var(--success);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        /* Modal for forgot password */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 7, 10, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-md);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-family: 'Clash Display', sans-serif;
            font-size: 22px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .modal-body p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-body .input-wrapper {
            margin-bottom: 24px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
        }

        .modal-footer .btn {
            flex: 1;
            padding: 12px;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .login-header h1 {
                font-size: 24px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fas fa-fox"></i>
                <span>FOX STORE</span>
            </a>

            <div class="nav-buttons">
                <a href="/register.html" class="btn btn-outline">
                    <i class="fas fa-user-plus"></i>
                    <span>S'inscrire</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="main-content">
        <div class="login-card">
            <div class="login-header">
                <h1>Connexion</h1>
                <p>Accédez à votre espace personnel</p>
            </div>

            <!-- Error / success messages -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <span></span>
            </div>

            <!-- Login form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" id="email" placeholder="exemple@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> 
                        <span>Se souvenir de moi</span>
                    </label>
                    <button type="button" class="forgot-password" id="forgotPasswordBtn">
                        Mot de passe oublié ?
                    </button>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    <span>Se connecter</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="separator">
                <span class="separator-line"></span>
                <span>ou</span>
                <span class="separator-line"></span>
            </div>

            <button class="btn-google" id="googleSignInBtn">
                <i class="fab fa-google"></i>
                <span>Continuer avec Google</span>
            </button>

            <div class="register-link">
                Pas encore de compte ?<a href="/register.html">S'inscrire</a>
            </div>
        </div>
    </div>

    <!-- Modal Mot de passe oublié -->
    <div class="modal" id="forgotModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Réinitialisation</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>
                <div class="input-wrapper">
                    <i class="far fa-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="votre@email.com">
                </div>
                <div id="modalError" class="error-message" style="margin-bottom: 20px; display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span></span>
                </div>
                <div id="modalSuccess" class="success-message" style="margin-bottom: 20px; display: none;">
                    <i class="fas fa-check-circle"></i>
                    <span></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelModalBtn">Annuler</button>
                <button class="btn btn-primary" id="sendResetBtn">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA0n2m2R9q07HQ94V58CdbNTlxnKztdmQo",
            authDomain: "fox-storeht.firebaseapp.com",
            projectId: "fox-storeht",
            storageBucket: "fox-storeht.firebasestorage.app",
            messagingSenderId: "589792388283",
            appId: "1:589792388283:web:c372bd886f0a98e82db59e",
            measurementId: "G-WN9M206F4M"
        };

        // Initialisation Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Email admin
        const ADMIN_EMAIL = "bmarcco4412@gmail.com";

        // Éléments DOM
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberCheck = document.getElementById('remember');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const googleBtn = document.getElementById('googleSignInBtn');
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        const forgotModal = document.getElementById('forgotModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const sendResetBtn = document.getElementById('sendResetBtn');
        const resetEmailInput = document.getElementById('resetEmail');
        const modalError = document.getElementById('modalError');
        const modalSuccess = document.getElementById('modalSuccess');

        // Afficher erreur
        function showError(message, container = errorDiv) {
            container.style.display = 'flex';
            container.querySelector('span').textContent = message;
            setTimeout(() => {
                container.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message, container = successDiv) {
            container.style.display = 'flex';
            container.querySelector('span').textContent = message;
            setTimeout(() => {
                container.style.display = 'none';
            }, 5000);
        }

        // Connexion email/mot de passe
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Définir la persistance selon la case "Se souvenir de moi"
            if (rememberCheck.checked) {
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            } else {
                await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
            }

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Redirection selon le rôle
                if (user.email === ADMIN_EMAIL) {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/home.html';
                }
            } catch (error) {
                console.error('Erreur de connexion', error);
                let message = 'Erreur de connexion. Vérifiez vos identifiants.';
                if (error.code === 'auth/user-not-found') message = 'Aucun compte trouvé avec cet email.';
                else if (error.code === 'auth/wrong-password') message = 'Mot de passe incorrect.';
                else if (error.code === 'auth/invalid-email') message = 'Email invalide.';
                else if (error.code === 'auth/too-many-requests') message = 'Trop de tentatives. Réessayez plus tard.';
                showError(message);
            }
        });

        // Connexion Google
        googleBtn.addEventListener('click', async () => {
            // Définir la persistance
            if (rememberCheck.checked) {
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            } else {
                await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
            }

            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // Redirection
                if (user.email === ADMIN_EMAIL) {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/home.html';
                }
            } catch (error) {
                console.error('Erreur Google', error);
                let message = 'Erreur lors de la connexion avec Google.';
                if (error.code === 'auth/popup-closed-by-user') {
                    message = 'Fenêtre de connexion fermée.';
                } else if (error.code === 'auth/popup-blocked') {
                    message = 'La popup a été bloquée. Autorisez les popups.';
                } else if (error.code === 'auth/cancelled-popup-request') {
                    message = 'Connexion annulée.';
                }
                showError(message);
            }
        });

        // Modal mot de passe oublié
        forgotBtn.addEventListener('click', () => {
            forgotModal.classList.add('active');
            resetEmailInput.value = '';
            modalError.style.display = 'none';
            modalSuccess.style.display = 'none';
        });

        function closeModal() {
            forgotModal.classList.remove('active');
        }

        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);

        forgotModal.addEventListener('click', (e) => {
            if (e.target === forgotModal) closeModal();
        });

        // Envoyer email de réinitialisation
        sendResetBtn.addEventListener('click', async () => {
            const email = resetEmailInput.value.trim();
            if (!email) {
                showError('Veuillez entrer votre adresse email.', modalError);
                return;
            }

            try {
                await auth.sendPasswordResetEmail(email);
                modalSuccess.style.display = 'flex';
                modalSuccess.querySelector('span').textContent = 'Email envoyé ! Vérifiez votre boîte de réception.';
                modalError.style.display = 'none';
                setTimeout(() => {
                    closeModal();
                }, 3000);
            } catch (error) {
                console.error('Erreur reset', error);
                let message = 'Erreur lors de l\'envoi.';
                if (error.code === 'auth/user-not-found') message = 'Aucun utilisateur avec cet email.';
                else if (error.code === 'auth/invalid-email') message = 'Email invalide.';
                showError(message, modalError);
            }
        });

        // Vérifier si l'utilisateur est déjà connecté (mais on ne redirige pas automatiquement)
        // On laisse l'utilisateur décider de se connecter ou non.
        // Si on veut éviter la redirection automatique, on ne fait rien ici.
        // Cependant, s'il est connecté, on pourrait afficher un message ou simplement le laisser.
        // Pour respecter la demande : "je ne veux pas de redirection sans avoir entré les infos",
        // on ne redirige pas automatiquement. On laisse l'utilisateur sur la page.
        // Mais s'il est déjà connecté, il peut cliquer sur "Se connecter" et ça le redirigera.
        // Optionnel : on peut afficher un message "Vous êtes déjà connecté" avec un lien vers home.
        auth.onAuthStateChanged(user => {
            if (user) {
                // Optionnel : afficher un message
                // showSuccess('Vous êtes déjà connecté. <a href="/home.html">Accéder à votre compte</a>');
                // Mais on ne redirige pas.
            }
        });
    </script>
</body>
</html>
