<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Échec du Paiement</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0056b3;
            --secondary: #002d5e;
            --white: #ffffff;
            --bg: #f8fafc;
            --failed-red: #d63031;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(0, 86, 179, 0.08);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .failed-card {
            background: var(--white); padding: 50px 30px; border-radius: 30px; text-align: center;
            max-width: 450px; width: 100%; box-shadow: 0 20px 50px rgba(0, 45, 94, 0.05);
            border: 1px solid var(--border); animation: slideIn 0.6s var(--transition);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .icon-box {
            width: 80px; height: 80px; background: rgba(214, 48, 49, 0.1); color: var(--failed-red);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; margin: 0 auto 25px;
        }

        h2 { font-size: 1.5rem; font-weight: 800; color: var(--secondary); margin-bottom: 12px; }
        p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            padding: 16px; border-radius: 15px; text-decoration: none; font-weight: 700;
            font-size: 0.9rem; transition: var(--transition); display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--failed-red); color: white; box-shadow: 0 8px 20px rgba(214, 48, 49, 0.2); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(214, 48, 49, 0.3); }
        .btn-outline { background: var(--white); color: var(--text-main); border: 1px solid var(--border); }
        .btn-outline:hover { background: #f8fafc; }
    </style>
</head>
<body>

    <div class="failed-card">
        <div class="icon-box">
            <i class="fas fa-circle-xmark"></i>
        </div>
        <h2>Transaction Échouée</h2>
        <p>Nous n'avons pas pu valider votre paiement. Cela peut être dû à un reçu illisible ou à une erreur dans les informations de transfert.</p>
        
        <div class="btn-group">
            <a href="/pages/checkout/cart.html" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i> Retour au panier
            </a>
            <a href="/orders.html" class="btn btn-outline">
                <i class="fas fa-list-ul"></i> Voir mes commandes
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
    </script>
</body>
</html>
