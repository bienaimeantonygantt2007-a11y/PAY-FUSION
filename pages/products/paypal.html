<!DOCTYPE html>

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .drawer-user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #00d1ff, #009ac7); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; font-weight: 600; }

        .drawer-nav { flex: 1; display: flex; flex-direction: column; padding: 8px 10px; gap: 2px; overflow-y: auto; }
        .drawer-section-title { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; padding: 8px 10px 4px 10px; }
        .drawer-nav a, .drawer-nav button { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; text-decoration: none; color: #1e293b; font-size: 0.85rem; font-weight: 500; background: none; border: 1px solid transparent; cursor: pointer; width: 100%; text-align: left; transition: all 0.2s; }
        .drawer-nav a i, .drawer-nav button i { width: 20px; font-size: 0.9rem; color: #5b6e8c; }
        .drawer-nav a:hover, .drawer-nav button:hover { background: #f1f5f9; border-color: #e2e8f0; }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 1999; display: none; }
        .drawer-overlay.active { display: block; }
        .main-content { padding: 90px 24px 50px; max-width: 800px; margin: 0 auto; }
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .page-header h1 i { color: #00d1ff; margin-right: 12px; }
        .product-card { background: white; border-radius: 28px; padding: 32px; border: 1px solid #eef2ff; margin-bottom: 24px; }
        .product-image { text-align: center; margin-bottom: 20px; }
        .product-image img { max-height: 100px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 16px; background: #f8fafc; }
        .btn-add-cart { background: #00d1ff; border: none; border-radius: 40px; padding: 14px; width: 100%; font-weight: 700; cursor: pointer; }
        .cart-badge { position: fixed; bottom: 90px; right: 20px; background: #00d1ff; color: white; width: 56px; height: 56px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 1100; }
        .cart-badge .count { position: absolute; top: -5px; right: -5px; background: #dc2626; width: 20px; height: 20px; border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; z-index: 1000; text-decoration: none; }
        footer { background: transparent; border-top: 1px solid #e2e8f0; padding: 20px; text-align: center; font-size: 0.75rem; color: #5b6e8c; margin-top: 40px; }
        @media (max-width: 640px) { .main-content { padding: 80px 16px 40px; } .drawer { width: 260px; right: -260px; } }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-container"><a href="/home.html" class="logo"><i class="fas fa-fox"></i><span>FOX STORE</span></a><button class="burger-btn" id="burgerBtn"><i class="fas fa-bars"></i></button></div></nav>
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer"><div class="drawer-header"><div class="logo"><i class="fas fa-fox"></i><span>Menu</span></div><button class="close-drawer" id="closeDrawerBtn"><i class="fas fa-times"></i></button></div><div id="drawerUserSection"></div><div class="drawer-nav" id="drawerNav"></div></div>
    <div id="cartBadge" class="cart-badge"><i class="fas fa-shopping-cart"></i><span class="count" id="cartCount">0</span></div>
    <a href="https://wa.me/50937542954" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <div class="main-content">
        <div class="page-header"><h1><i class="fab fa-paypal"></i> Recharge PayPal</h1><p>1 USD = 150 HTG - Transfert instantané</p></div>
        <div class="product-card">
            <div class="product-image"><img src="/assets/logos/paypal-logo.png" alt="PayPal"></div>
            <div class="form-group"><label>Email PayPal</label><input type="email" id="paypalEmail" placeholder="votre@email.com" required></div>
            <div class="form-group"><label>Montant (USD)</label><input type="number" id="amountUSD" placeholder="Ex: 10" min="5" max="5000" required></div>
            <div class="form-group"><label>Numéro WhatsApp</label><input type="tel" id="whatsapp" placeholder="509XXXXXXXX" required></div>
            <button class="btn-add-cart" id="addToCartBtn">Ajouter au panier</button>
        </div>
    </div>
    <footer><p>© 2025 Fox Store – L'élite du service digital. Tous droits réservés.</p></footer>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDSyFdTHBNULuUiacHM6nmEvPb7YpY24UE", authDomain: "foxstoreht.firebaseapp.com", projectId: "foxstoreht", storageBucket: "foxstoreht.firebasestorage.app", messagingSenderId: "72533137445", appId: "1:72533137445:web:3ba7634bc34da6115b47cc", measurementId: "G-X1Q7Q79BRD" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const ADMIN_EMAIL = "foxstorehaiti@gmail.com";
        // Drawer (identique)
        const drawerNav = document.getElementById('drawerNav'), drawerUserSection = document.getElementById('drawerUserSection'), burgerBtn = document.getElementById('burgerBtn'), drawer = document.getElementById('drawer'), drawerOverlay = document.getElementById('drawerOverlay'), closeDrawerBtn = document.getElementById('closeDrawerBtn');
        function closeDrawer() { drawer.classList.remove('open'); drawerOverlay.classList.remove('active'); }
        function openDrawer() { drawer.classList.add('open'); drawerOverlay.classList.add('active'); }
        burgerBtn?.addEventListener('click', openDrawer);
        closeDrawerBtn?.addEventListener('click', closeDrawer);
        drawerOverlay?.addEventListener('click', closeDrawer);
        function updateDrawer(user) { if(!user) return; const name = user.displayName || user.email || 'Client', isAdmin = (user.email === ADMIN_EMAIL), initial = name.charAt(0).toUpperCase(); drawerUserSection.innerHTML = `<div class="drawer-user"><div class="drawer-user-avatar">${initial}</div><div class="drawer-user-info"><h4>${name}</h4><p>${user.email}</p>${isAdmin ? '<p style="color:#00d1ff; font-size:0.7rem;">Administrateur</p>' : ''}</div></div>`; let menu = `<div class="drawer-section-title">PRINCIPALE</div><a href="/home.html"><i class="fas fa-home"></i> Accueil</a><a href="/user/notifications.html"><i class="fas fa-bullhorn"></i> Annonce</a><div class="drawer-section-title">PORTEFEUILLE</div><a href="/user/wallet.html"><i class="fas fa-wallet"></i> Wallet</a><div class="drawer-section-title">SERVICES</div><a href="/gaming.html"><i class="fas fa-gamepad"></i> Gaming</a><a href="/streaming.html"><i class="fas fa-film"></i> Streaming</a><a href="/finance.html"><i class="fas fa-coins"></i> Finance</a><div class="drawer-section-title">COMPTE</div><a href="/orders.html"><i class="fas fa-shopping-cart"></i> Commandes</a><a href="/user/account.html"><i class="fas fa-user"></i> Mon compte</a><a href="/user/settings.html"><i class="fas fa-sliders-h"></i> Paramètres</a><a href="/user/supports.html"><i class="fas fa-headset"></i> Support</a>`; if(isAdmin) menu += `<div class="drawer-section-title">ADMINISTRATION</div><a href="/admin.html"><i class="fas fa-shield-alt"></i> Administration</a>`; menu += `<div class="drawer-section-title">RESEAUX</div><a href="https://whatsapp.com/channel/0029Vb84FJYAojYxTIur7b2n" target="_blank"><i class="fab fa-whatsapp"></i> Chaine WhatsApp</a><button id="drawerLogoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>`; drawerNav.innerHTML = menu; document.getElementById('drawerLogoutBtn')?.addEventListener('click', async () => { await auth.signOut(); window.location.href = '/login.html'; }); }
        auth.onAuthStateChanged(user => { if(!user) { window.location.href = '/login.html'; return; } updateDrawer(user); });
        // Panier sans alert
        function getCart() { const c = localStorage.getItem('foxstore_cart'); return c ? JSON.parse(c) : []; }
        function saveCart(cart) { localStorage.setItem('foxstore_cart', JSON.stringify(cart)); updateCartBadge(); }
        function updateCartBadge() { const cart = getCart(); const count = cart.length; const badge = document.getElementById('cartBadge'); if(count > 0) { badge.style.display = 'flex'; document.getElementById('cartCount').textContent = count; } else { badge.style.display = 'none'; } }
        document.getElementById('cartBadge').addEventListener('click', () => window.location.href = '/pages/checkout/cart.html');
        document.getElementById('addToCartBtn').addEventListener('click', () => { const paypalEmail = document.getElementById('paypalEmail').value.trim(); const amountUSD = parseFloat(document.getElementById('amountUSD').value); const whatsapp = document.getElementById('whatsapp').value.trim(); if(!paypalEmail || isNaN(amountUSD) || amountUSD < 5 || amountUSD > 5000 || !whatsapp) return; const user = auth.currentUser; if(!user) { window.location.href = '/login.html'; return; } const priceHTG = amountUSD * 150; const cartItem = { id: Date.now() + '_' + Math.random().toString(36).substr(2,6), userId: user.uid, userEmail: user.email, serviceCategory: "finance", serviceName: "PayPal", productName: `${amountUSD} USD`, price: priceHTG, quantity: 1, total: priceHTG, customerInfo: { paypalEmail: paypalEmail, whatsapp: whatsapp, amountUSD: amountUSD }, status: "en-attente" }; const cart = getCart(); cart.push(cartItem); saveCart(cart); document.getElementById('paypalEmail').value = ''; document.getElementById('amountUSD').value = ''; document.getElementById('whatsapp').value = ''; });
        updateCartBadge();
    </script>
