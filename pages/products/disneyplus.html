<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Disney+ Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --secondary: #002d5e; --white: #ffffff; --bg: #f8fafc; --text: #1e293b; --muted: #64748b; --border: rgba(0, 86, 179, 0.08); --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; }
        header { height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }
        .product-hero { background: var(--white); padding: 40px 5%; text-align: center; border-bottom: 1px solid var(--border); }
        .product-hero img { height: 80px; width: 80px; object-fit: contain; margin-bottom: 15px; }
        .product-hero h2 { font-weight: 800; color: var(--secondary); margin-bottom: 10px; }
        .product-hero p { font-size: 0.85rem; color: var(--muted); max-width: 450px; margin: 0 auto; line-height: 1.5; }
        .section-label { padding: 30px 5% 15px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 800; }
        .packs-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 0 5%; }
        .pack-card { background: var(--white); padding: 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; transition: var(--transition); cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .pack-card.selected { border-color: var(--primary); background: #f0f7ff; }
        .pack-card h4 { font-weight: 800; font-size: 1.1rem; color: var(--secondary); }
        .pack-card .price { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        .order-form { margin: 35px 5%; background: var(--white); padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid var(--border); display: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 0.95rem; background: #fcfcfd; }
        .btn-add { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--white); border: none; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
    </style>
</head>
<body>
    <header><a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Disney+</h1></header>
    <div class="product-hero"><img src="/assets/logos/disneyplus-logo.png" alt="Disney+"><h2>Abonnement Premium</h2><p>Marvel, Star Wars, Pixar et bien plus. Profitez du streaming en 4K UHD.</p></div>
    <div id="main-content">
        <p class="section-label">Sélectionnez la durée</p>
        <div class="packs-grid">
            <div class="pack-card" onclick="selectPack('Disney+ 1 Mois', 625, this)"><div><h4>1 Mois</h4><p style="font-size:0.8rem; color:var(--muted); font-weight:600;">Privé ● 4K UHD</p></div><div class="price">625 HTG</div></div>
            <div class="pack-card" onclick="selectPack('Disney+ 2 Mois', 1200, this)"><div><h4>2 Mois</h4><p style="font-size:0.8rem; color:var(--muted); font-weight:600;">Privé ● 4K UHD</p></div><div class="price">1,200 HTG</div></div>
            <div class="pack-card" onclick="selectPack('Disney+ 3 Mois', 1800, this)"><div><h4>3 Mois</h4><p style="font-size:0.8rem; color:var(--muted); font-weight:600;">Privé ● 4K UHD</p></div><div class="price">1,800 HTG</div></div>
        </div>
        <div class="order-form" id="orderFormSec">
            <div id="selectionSummary" style="margin-bottom:25px; padding:15px; background:#f0f7ff; border-radius:15px; font-weight:700; color:var(--primary); font-size:0.9rem; border-left:5px solid var(--primary);"></div>
            <form id="disneyForm">
                <div class="form-group"><label>Email de réception</label><input type="email" id="email" placeholder="votre@email.com" required></div>
                <div class="form-group"><label>Numéro WhatsApp</label><input type="tel" id="whatsapp" placeholder="Ex: +50937000000" required></div>
                <button type="submit" class="btn-add">Ajouter au panier <i class="fas fa-shopping-basket"></i></button>
            </form>
        </div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        let currentSelection = null;
        function selectPack(n, p, el) { currentSelection = {n, p}; document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected')); el.classList.add('selected'); document.getElementById('orderFormSec').style.display = 'block'; document.getElementById('selectionSummary').innerHTML = `<i class="fas fa-check-circle"></i> Sélection : ${n}`; }
        document.getElementById('disneyForm').onsubmit = (e) => { e.preventDefault(); const item = { category: "streaming", name: "Disney+", product: currentSelection.n, price: currentSelection.p, email: document.getElementById('email').value, whatsapp: document.getElementById('whatsapp').value, id: Date.now() }; let cart = JSON.parse(localStorage.getItem('foxstore_cart')) || []; cart.push(item); localStorage.setItem('foxstore_cart', JSON.stringify(cart)); window.location.href = "/pages/checkout/cart.html"; };
    </script>
</body>
</html>
