<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Prime Video Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a8e1; --secondary: #1a242e; --white: #ffffff; --bg: #f4f7f9; --text: #1a1a1a; --border: rgba(0, 168, 225, 0.1); --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; }
        header { height: 65px; background: var(--secondary); display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000; }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--white); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }
        .product-hero { background: var(--secondary); padding: 40px 5%; text-align: center; color: white; }
        .product-hero img { height: 70px; object-fit: contain; margin-bottom: 15px; }
        .product-hero p { font-size: 0.85rem; opacity: 0.8; max-width: 400px; margin: 0 auto; }
        .packs-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 25px 5% 0; }
        .pack-card { background: var(--white); padding: 25px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; transition: var(--transition); cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .pack-card.selected { border-color: var(--primary); background: #f0fbff; }
        .pack-info h4 { font-weight: 800; font-size: 1.1rem; color: var(--secondary); }
        .pack-price { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        .order-form { margin: 30px 5%; background: var(--white); padding: 30px; border-radius: 25px; border: 1px solid var(--border); display: none; animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; }
        .form-group input { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; background: #fcfcfd; }
        .btn-add { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <header><a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Prime Video</h1></header>
    <div class="product-hero"><img src="/assets/logos/primevideo-logo.png" alt="Prime Video"><p>Accès Premium aux films et séries Amazon Originals. Qualité 4K UHD.</p></div>
    <div class="packs-grid">
        <div class="pack-card" onclick="selectPack('Prime Video 1 Mois', 425, this)"><div><h4>1 Mois</h4><p style="font-size:0.8rem; color:gray;">Compte Privé ● 4K</p></div><div class="pack-price">425 HTG</div></div>
        <div class="pack-card" onclick="selectPack('Prime Video 2 Mois', 825, this)"><div><h4>2 Mois</h4><p style="font-size:0.8rem; color:gray;">Compte Privé ● 4K</p></div><div class="pack-price">825 HTG</div></div>
        <div class="pack-card" onclick="selectPack('Prime Video 3 Mois', 1240, this)"><div><h4>3 Mois</h4><p style="font-size:0.8rem; color:gray;">Compte Privé ● 4K</p></div><div class="pack-price">1,240 HTG</div></div>
    </div>
    <div class="order-form" id="orderFormSec">
        <form id="primeForm">
            <div class="form-group"><label>EMAIL DE RÉCEPTION</label><input type="email" id="email" required></div>
            <div class="form-group"><label>NUMÉRO WHATSAPP</label><input type="tel" id="whatsapp" required></div>
            <button type="submit" class="btn-add">Ajouter au panier <i class="fas fa-shopping-bag"></i></button>
        </form>
    </div>
    <script>
        let currentSelection = null;
        function selectPack(n, p, el) { currentSelection = {n, p}; document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected')); el.classList.add('selected'); document.getElementById('orderFormSec').style.display = 'block'; }
        document.getElementById('primeForm').onsubmit = (e) => { e.preventDefault(); const item = { category: "streaming", name: "Prime Video", product: currentSelection.n, price: currentSelection.p, email: document.getElementById('email').value, whatsapp: document.getElementById('whatsapp').value, id: Date.now() }; let cart = JSON.parse(localStorage.getItem('foxstore_cart')) || []; cart.push(item); localStorage.setItem('foxstore_cart', JSON.stringify(cart)); window.location.href = "/pages/checkout/cart.html"; };
    </script>
</body>
</html>
