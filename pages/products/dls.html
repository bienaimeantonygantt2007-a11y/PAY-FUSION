<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - DLS 26 Coins & Gems</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --secondary: #1e293b; --white: #ffffff; --bg: #f8fafc; --muted: #64748b; --border: rgba(46, 204, 113, 0.1); --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); padding-bottom: 40px; }
        header { height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: var(--transition); }
        .back-btn:hover { background: #f0fff4; transform: translateX(-3px); }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }
        .product-hero { background: var(--white); padding: 50px 5%; text-align: center; border-bottom: 1px solid var(--border); }
        .product-hero img { width: 320px; height: auto; max-width: 85%; filter: drop-shadow(0 15px 30px rgba(46, 204, 113, 0.2)); margin-bottom: 25px; }
        .product-hero h2 { font-weight: 800; color: var(--secondary); margin-bottom: 10px; }
        .section-label { padding: 30px 5% 15px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 800; }
        .packs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 5%; }
        .pack-card { background: var(--white); padding: 25px 15px; border-radius: 20px; text-align: center; border: 2px solid transparent; transition: var(--transition); cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .pack-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .pack-card.selected { border-color: var(--primary); background: #f0fff4; }
        .pack-card i { color: #f1c40f; font-size: 1.8rem; margin-bottom: 12px; display: block; }
        .pack-card .name { display: block; font-weight: 800; font-size: 0.9rem; color: var(--secondary); margin-bottom: 4px; }
        .pack-card .price { display: block; color: var(--primary); font-weight: 700; font-size: 0.85rem; }
        .order-form { margin: 35px 5%; background: var(--white); padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid var(--border); display: none; animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 0.95rem; background: #fcfcfd; transition: 0.3s; }
        .btn-add { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--primary), #27ae60); color: var(--white); border: none; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
    </style>
</head>
<body>
    <header><a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>DLS 26</h1></header>
    <div class="product-hero"><img src="/assets/logos/dls-logo.png" alt="DLS 26"><h2>Dream League Recharges</h2><p>Coins & Gems livrés via connexion au compte. Sécurité et rapidité garanties par Fox Store.</p></div>
    <div id="main-content">
        <p class="section-label">Packs de Pièces & Gemmes</p>
        <div class="packs-grid" id="dlsGrid"></div>
        <div class="order-form" id="orderFormSec">
            <div id="selectionSummary" style="margin-bottom:25px; padding:15px; background:#f0fff4; border-radius:15px; font-weight:700; color:var(--primary); font-size:0.9rem; border-left:5px solid var(--primary);"></div>
            <form id="dlsForm">
                <div class="form-group"><label>Email du compte (Google/FB)</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Mot de passe</label><input type="password" id="pass" required></div>
                <div class="form-group"><label>Votre Numéro WhatsApp</label><input type="tel" id="whatsapp" placeholder="+509..." required></div>
                <button type="submit" class="btn-add">Ajouter au panier <i class="fas fa-shopping-basket"></i></button>
            </form>
        </div>
    </div>
    <script>
        const packs = [{n:"900 Coins", p:400}, {n:"3450 Coins", p:1400}, {n:"40500 Coins", p:9250}, {n:"90 Gems", p:400}, {n:"400 Gems", p:1600}, {n:"2700 Gems", p:8850}, {n:"Season Pass", p:810}];
        const grid = document.getElementById('dlsGrid');
        let currentSelection = null;
        packs.forEach(item => {
            const card = document.createElement('div'); card.className = 'pack-card';
            card.innerHTML = `<i class="fas fa-coins"></i><span class="name">${item.n}</span><span class="price">${item.p} HTG</span>`;
            card.onclick = () => { currentSelection = item; document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); document.getElementById('orderFormSec').style.display = 'block'; document.getElementById('selectionSummary').innerHTML = `<i class="fas fa-check-circle"></i> Sélection : ${item.n}`; document.getElementById('orderFormSec').scrollIntoView({ behavior: 'smooth', block: 'center' }); };
            grid.appendChild(card);
        });
        document.getElementById('dlsForm').onsubmit = (e) => { e.preventDefault(); const item = { category: "gaming", name: "DLS 26", product: currentSelection.n, price: currentSelection.p, gameId: document.getElementById('email').value, gameName: document.getElementById('pass').value, whatsapp: document.getElementById('whatsapp').value, id: Date.now() }; let cart = JSON.parse(localStorage.getItem('foxstore_cart')) || []; cart.push(item); localStorage.setItem('foxstore_cart', JSON.stringify(cart)); window.location.href = "/pages/checkout/cart.html"; };
    </script>
</body>
</html>
