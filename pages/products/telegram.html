<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Telegram Premium</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #24A1DE;
            --secondary: #1d88bc;
            --white: #ffffff;
            --bg: #f5f9fc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(36, 161, 222, 0.1);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 40px; }

        header {
            height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: var(--transition); }
        .back-btn:hover { background: #eef8ff; transform: translateX(-3px); }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }

        .product-hero {
            background: var(--white); padding: 50px 5%; text-align: center; border-bottom: 1px solid var(--border);
        }
        .product-hero img { height: 80px; width: 80px; object-fit: contain; margin-bottom: 15px; }
        .product-hero h2 { font-weight: 800; color: var(--secondary); margin-bottom: 10px; font-size: 1.4rem; }
        .product-hero p { font-size: 0.85rem; color: var(--text-muted); max-width: 450px; margin: 0 auto; line-height: 1.5; }

        .section-label { padding: 30px 5% 15px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 800; }
        .packs-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 0 5%; }

        .pack-card {
            background: var(--white); padding: 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
            border: 2px solid transparent; transition: var(--transition); cursor: pointer;
            box-shadow: 0 4px 20px rgba(36,161,222,0.05);
        }
        .pack-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .pack-card.selected { border-color: var(--primary); background: #f0faff; }

        .pack-info h4 { font-weight: 800; font-size: 1.1rem; color: var(--secondary); margin-bottom: 4px; }
        .pack-info p { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .pack-price { color: var(--primary); font-weight: 800; font-size: 1.15rem; }

        .order-form {
            margin: 35px 5%; background: var(--white); padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid var(--border);
            display: none; animation: slideUp 0.5s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; }
        .form-group input {
            width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px;
            outline: none; font-size: 0.95rem; background: #fcfcfd; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(36, 161, 222, 0.05); }

        .btn-add {
            width: 100%; padding: 20px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white); border: none; border-radius: 15px; font-size: 1rem;
            font-weight: 800; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(36, 161, 222, 0.2);
        }
        .btn-add:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(36, 161, 222, 0.3); }
    </style>
</head>
<body>

    <header>
        <a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>Telegram</h1>
    </header>

    <div class="product-hero">
        <img src="/assets/logos/telegram-logo.png" alt="Telegram">
        <h2>Premium Badge</h2>
        <p>Doublez vos limites, obtenez des emojis exclusifs et un badge de profil. Activation via votre numéro de compte.</p>
    </div>

    <div id="main-content">
        <p class="section-label">Abonnement Premium</p>
        <div class="packs-grid">
            <div class="pack-card" onclick="selectPack('Telegram 1 Mois', 1160, this)">
                <div class="pack-info"><h4>1 Mois</h4><p>Features Premium ● Badge</p></div>
                <div class="pack-price">1,160 HTG</div>
            </div>
            <div class="pack-card" onclick="selectPack('Telegram 1 An', 8600, this)">
                <div class="pack-info"><h4>1 An</h4><p>Features Premium ● Économique</p></div>
                <div class="pack-price">8,600 HTG</div>
            </div>
        </div>

        <div class="order-form" id="orderFormSec">
            <div id="selectionSummary" style="margin-bottom:25px; padding:15px; background:#f0faff; border-radius:15px; font-weight:700; color:var(--primary); font-size:0.9rem; border-left:4px solid var(--primary);"></div>
            
            <form id="tgForm">
                <div class="form-group">
                    <label>Numéro de téléphone Telegram</label>
                    <input type="tel" id="tgNumber" placeholder="Ex: +50937000000" required>
                </div>
                <div class="form-group">
                    <label>Votre Numéro WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="Ex: +50936000000" required>
                </div>
                <button type="submit" class="btn-add">Ajouter au panier <i class="fas fa-star"></i></button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);

        let currentSelection = null;

        function selectPack(name, price, el) {
            currentSelection = { name, price };
            document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('orderFormSec').style.display = 'block';
            document.getElementById('selectionSummary').innerHTML = `<i class="fas fa-info-circle"></i> Activation : ${name} ● ${price} HTG`;
            document.getElementById('orderFormSec').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.getElementById('tgForm').onsubmit = (e) => {
            e.preventDefault();
            const item = { category: "digitale", name: "Telegram", product: currentSelection.name, price: currentSelection.price, gameId: document.getElementById('tgNumber').value, whatsapp: document.getElementById('whatsapp').value, id: Date.now() };
            let cart = JSON.parse(localStorage.getItem('foxstore_cart')) || [];
            cart.push(item);
            localStorage.setItem('foxstore_cart', JSON.stringify(cart));
            window.location.href = "/pages/checkout/cart.html";
        };
    </script>
</body>
</html>
