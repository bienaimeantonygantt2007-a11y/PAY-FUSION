<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - PUBG Mobile UC</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0056b3;
            --secondary: #002d5e;
            --accent: #ffab00;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: rgba(0, 86, 179, 0.08);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; }

        header {
            height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: var(--transition); }
        .back-btn:hover { background: #f0f7ff; }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }

        .product-hero { background: var(--white); padding: 50px 5%; text-align: center; border-bottom: 1px solid var(--border); }
        .product-hero img { width: 320px; height: auto; max-width: 85%; object-fit: contain; margin-bottom: 25px; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1)); }
        .product-hero h2 { font-weight: 800; color: var(--secondary); margin-bottom: 10px; }
        .product-hero p { font-size: 0.85rem; color: var(--muted); max-width: 450px; margin: 0 auto; line-height: 1.5; }

        #status-alert { display: none; background: #fff4f4; color: #d63031; padding: 12px; text-align: center; font-weight: 700; font-size: 0.8rem; border-bottom: 1px solid rgba(214, 48, 49, 0.1); }

        .section-label { padding: 30px 5% 15px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 800; }
        .packs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 5%; }

        .pack-card {
            background: var(--white); padding: 25px 15px; border-radius: 20px; text-align: center;
            border: 2px solid transparent; transition: var(--transition); cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .pack-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .pack-card.selected { border-color: var(--primary); background: #f0f7ff; }
        .pack-card i { color: var(--accent); font-size: 1.8rem; margin-bottom: 12px; display: block; }
        .pack-card .name { display: block; font-weight: 800; font-size: 0.9rem; color: var(--secondary); margin-bottom: 4px; }
        .pack-card .price { display: block; color: var(--primary); font-weight: 700; font-size: 0.85rem; }

        .order-form { margin: 35px 5%; background: var(--white); padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid var(--border); display: none; animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; }
        .form-group input { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 0.95rem; background: #fcfcfd; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.05); }

        .btn-add { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--white); border: none; border-radius: 15px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-add:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(0, 86, 179, 0.25); }
    </style>
</head>
<body>
    <div id="status-alert"><i class="fas fa-exclamation-triangle"></i> <span id="status-text">Service indisponible</span></div>
    <header><a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>PUBG Mobile</h1></header>

    <div class="product-hero">
        <img src="/assets/logos/pubgmobile-logo.png" alt="PUBG Mobile">
        <h2>Recharge UC Global</h2>
        <p>Achetez vos Unknown Cash instantanément. Fox Store assure une livraison rapide sur votre compte joueur.</p>
    </div>

    <div id="main-content">
        <p class="section-label">Packs UC Disponibles</p>
        <div class="packs-grid" id="ucGrid"></div>

        <div class="order-form" id="orderFormSec">
            <div id="selectionSummary" style="margin-bottom:25px; padding:15px; background:#f0f7ff; border-radius:15px; font-weight:700; color:var(--primary); font-size:0.9rem; border-left:5px solid var(--primary);"></div>
            <form id="pubgForm">
                <div class="form-group"><label>Email du compte PUBG</label><input type="email" id="email" placeholder="votre@email.com" required></div>
                <div class="form-group"><label>Numéro WhatsApp</label><input type="tel" id="whatsapp" placeholder="Ex: +50937000000" required></div>
                <button type="submit" class="btn-add">Ajouter au panier <i class="fas fa-shopping-basket"></i></button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentSelection = null;
        auth.onAuthStateChanged(user => { if (!user) window.location.href = "/login.html"; else checkCMS(); });
        function checkCMS() { db.collection("cms_services").doc("PUBG Mobile").onSnapshot(doc => { if (doc.exists && !doc.data().active) { document.getElementById('main-content').style.opacity = "0.3"; document.getElementById('main-content').style.pointerEvents = "none"; document.getElementById('status-alert').style.display = "block"; document.getElementById('status-text').textContent = doc.data().message || "Service en maintenance"; } }); }

        const packs = [{n:"60 UC", p:180}, {n:"300 + 25 UC", p:891}, {n:"600 + 60 UC", p:1780}, {n:"1500 + 300 UC", p:4130}, {n:"3000 + 850 UC", p:8075}];
        const grid = document.getElementById('ucGrid');
        packs.forEach(item => {
            const card = document.createElement('div'); card.className = 'pack-card';
            card.innerHTML = `<i class="fas fa-bolt-lightning"></i><span class="name">${item.n}</span><span class="price">${item.p} HTG</span>`;
            card.onclick = () => { currentSelection = item; document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); document.getElementById('orderFormSec').style.display = 'block'; document.getElementById('selectionSummary').innerHTML = `<i class="fas fa-check-circle"></i> Sélection : ${item.n} ● ${item.p} HTG`; document.getElementById('orderFormSec').scrollIntoView({ behavior: 'smooth', block: 'center' }); };
            grid.appendChild(card);
        });

        document.getElementById('pubgForm').onsubmit = (e) => {
            e.preventDefault();
            const order = { category: "gaming", name: "PUBG Mobile", product: currentSelection.n, price: currentSelection.p, email: document.getElementById('email').value, whatsapp: document.getElementById('whatsapp').value, id: Date.now() };
            let cart = JSON.parse(localStorage.getItem('foxstore_cart')) || [];
            cart.push(order);
            localStorage.setItem('foxstore_cart', JSON.stringify(cart));
            window.location.href = "/pages/checkout/cart.html";
        };
    </script>
</body>
</html>
