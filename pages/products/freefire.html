<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Free Fire Recharges</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --secondary: #002d5e; --accent: #ffab00; --bg: #f8fafc; --white: #ffffff; --border: rgba(0, 86, 179, 0.08); --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #1a1a1a; padding-bottom: 40px; }
        header { height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: var(--transition); }
        .back-btn:hover { background: #f0f7ff; transform: translateX(-3px); }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }
        .product-hero { background: var(--white); padding: 50px 5%; text-align: center; border-bottom: 1px solid var(--border); }
        .product-hero img { width: 320px; height: auto; max-width: 85%; filter: drop-shadow(0 15px 30px rgba(0, 86, 179, 0.15)); margin-bottom: 25px; }
        .section-label { padding: 30px 5% 15px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--primary); font-weight: 800; }
        .packs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 5%; }
        .pack-card { background: var(--white); padding: 25px 15px; border-radius: 20px; text-align: center; border: 2px solid transparent; transition: var(--transition); cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .pack-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .pack-card.selected { border-color: var(--primary); background: #f0f7ff; box-shadow: 0 10px 20px rgba(0, 86, 179, 0.1); }
        .pack-card i { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; display: block; }
        .pack-card .name { display: block; font-weight: 800; font-size: 0.85rem; color: var(--secondary); margin-bottom: 4px; }
        .pack-card .price { display: block; color: var(--primary); font-weight: 700; font-size: 0.8rem; }
        .order-form { margin: 35px 5%; background: var(--white); padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid var(--border); display: none; animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 0.95rem; background: #fcfcfd; }
        .btn-add { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <header><a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Free Fire</h1></header>
    <div class="product-hero"><img src="/assets/logos/freefire-logo.png" alt="Free Fire"><h2>Diamants & Pass</h2><p>Recharges certifiées Garena. Livraison par ID ou Login selon le pack sélectionné.</p></div>
    <div id="main-content">
        <p class="section-label">Abonnements & Pass</p>
        <div class="packs-grid">
            <div class="pack-card" onclick="selectPack('Abonnement Semaine', 325, this, 'login')"><i class="fas fa-calendar-day"></i><span class="name">Semaine</span><span class="price">325 HTG</span></div>
            <div class="pack-card" onclick="selectPack('Abonnement Mois', 1600, this, 'login')"><i class="fas fa-calendar-alt"></i><span class="name">Mois</span><span class="price">1,600 HTG</span></div>
            <div class="pack-card" onclick="selectPack('Level Up Pass', 800, this, 'login')"><i class="fas fa-chart-line"></i><span class="name">Level Up Pass</span><span class="price">800 HTG</span></div>
            <div class="pack-card" onclick="selectPack('Booyah Pass', 400, this, 'id')"><i class="fas fa-fire"></i><span class="name">Booyah Pass</span><span class="price">400 HTG</span></div>
        </div>
        <p class="section-label">Packs Diamants (Direct ID)</p>
        <div class="packs-grid" id="diamGrid"></div>
        <div class="order-form" id="orderFormSec">
            <div id="selectionSummary" style="margin-bottom:20px; padding:12px; background:#f0f7ff; border-radius:12px; font-weight:700; color:var(--primary); font-size:0.85rem; border-left:4px solid var(--primary);"></div>
            <form id="ffForm">
                <div id="dynamicFields"></div>
                <div class="form-group"><label>VOTRE NUMÉRO WHATSAPP</label><input type="tel" id="whatsapp" placeholder="+509..." required></div>
                <button type="submit" class="btn-add">Ajouter au panier <i class="fas fa-shopping-basket"></i></button>
            </form>
        </div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        const packs = [{n:"110 + 10 💎", p:157}, {n:"310 + 31 💎", p:471}, {n:"520 + 52 💎", p:775}, {n:"1060 + 106 💎", p:1550}, {n:"2180 + 218 💎", p:3100}, {n:"5600 + 560 💎", p:7750}];
        const grid = document.getElementById('diamGrid');
        let currentSelection = null;
        packs.forEach(item => {
            const card = document.createElement('div'); card.className = 'pack-card';
            card.innerHTML = `<i class="fas fa-gem"></i><span class="name">${item.n}</span><span class="price">${item.p} HTG</span>`;
            card.onclick = () => selectPack(item.n, item.p, card, 'id');
            grid.appendChild(card);
        });
        function selectPack(n, p, el, type) {
            currentSelection = {n, p, type}; document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected')); el.classList.add('selected');
            document.getElementById('orderFormSec').style.display = 'block';
            document.getElementById('selectionSummary').innerHTML = `Sélection : ${n}`;
            document.getElementById('dynamicFields').innerHTML = type === 'id' ? 
                `<div class="form-group"><label>PLAYER ID</label><input type="number" id="gameId" required></div><div class="form-group"><label>PSEUDO EN JEU</label><input type="text" id="gameName" required></div>` :
                `<div class="form-group"><label>EMAIL / LOGIN</label><input type="text" id="gameId" required></div><div class="form-group"><label>MOT DE PASSE</label><input type="password" id="gameName" required></div>`;
            document.getElementById('orderFormSec').scrollIntoView({ behavior: 'smooth' });
        }
        document.getElementById('ffForm').onsubmit = (e) => { e.preventDefault(); const item = { category: "gaming", name: "Free Fire", product: currentSelection.n, price: currentSelection.p, gameId: document.getElementById('gameId').value, gameName: document.getElementById('gameName').value, whatsapp: document.getElementById('whatsapp').value, id: Date.now() }; let cart = JSON.parse(localStorage.getItem('foxstore_cart')) || []; cart.push(item); localStorage.setItem('foxstore_cart', JSON.stringify(cart)); window.location.href = "/pages/checkout/cart.html"; };
    </script>
</body>
</html>
