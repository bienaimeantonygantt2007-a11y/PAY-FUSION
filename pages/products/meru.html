<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Recharge MERU Finance</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #000000;
            --secondary: #1a1a1a;
            --white: #ffffff;
            --bg: #f8fafc;
            --text-main: #111111;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.06);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 40px; }

        /* --- HEADER --- */
        header {
            height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { 
            color: var(--primary); font-size: 1.2rem; text-decoration: none; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; transition: var(--transition);
        }
        .back-btn:hover { background: #f1f1f1; transform: translateX(-3px); }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }

        /* --- HERO --- */
        .product-hero {
            background: var(--white); padding: 50px 5%; text-align: center; border-bottom: 1px solid var(--border);
        }
        .product-hero img { height: 80px; width: 80px; object-fit: contain; margin-bottom: 20px; filter: grayscale(1); }
        .product-hero h2 { font-weight: 800; color: var(--primary); margin-bottom: 10px; font-size: 1.5rem; }
        .product-hero p { font-size: 0.85rem; color: var(--text-muted); max-width: 450px; margin: 0 auto; line-height: 1.6; }

        /* --- CONTAINER --- */
        .container { padding: 30px 5%; max-width: 500px; margin: 0 auto; }

        .order-form {
            background: var(--white); padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.03); border: 1px solid var(--border);
            animation: slideUp 0.6s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CALCULATEUR --- */
        .calc-box { 
            background: #f1f5f9; padding: 20px; border-radius: 20px; margin-bottom: 25px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }
        .calc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calc-row:last-child { margin-bottom: 0; padding-top: 10px; border-top: 1px dashed #cbd5e1; }
        .calc-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .calc-val { font-weight: 800; color: var(--primary); font-size: 1rem; }
        .calc-total { font-size: 1.2rem; color: var(--primary); }

        /* --- INPUTS --- */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        .form-group input {
            width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 14px;
            outline: none; font-size: 0.95rem; font-weight: 600; background: #fcfcfd; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.03); }

        /* --- BUTTON --- */
        .btn-add {
            width: 100%; padding: 20px; background: var(--primary);
            color: var(--white); border: none; border-radius: 16px; font-size: 1.05rem;
            font-weight: 800; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        .btn-add:hover { transform: translateY(-4px); background: var(--secondary); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2); }
        .btn-add i { font-size: 1.2rem; }

    </style>
</head>
<body>

    <header>
        <a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>MERU Finance</h1>
    </header>

    <div class="product-hero">
        <img src="/assets/logos/payfusion-logo.png" alt="MERU">
        <h2>Recharge Directe</h2>
        <p>Alimentez votre compte MERU en quelques minutes. Profitez du meilleur taux de change pour vos transactions.</p>
    </div>

    <div class="container">
        <form class="order-form" id="meruForm">
            <!-- Saisie Montant -->
            <div class="form-group">
                <label>Montant à recevoir ($)</label>
                <input type="number" id="usdAmount" placeholder="Minimum 5$" min="5" required>
            </div>

            <!-- Box de conversion -->
            <div class="calc-box">
                <div class="calc-row">
                    <span class="calc-label">Taux appliqué</span>
                    <span class="calc-val">150 HTG</span>
                </div>
                <div class="calc-row">
                    <span class="calc-label">Total à payer</span>
                    <span class="calc-val calc-total" id="totalHTG">0 HTG</span>
                </div>
            </div>

            <!-- Infos MERU -->
            <div class="form-group">
                <label>Email du compte MERU</label>
                <input type="email" id="meruEmail" placeholder="votre-email@meru.com" required>
            </div>

            <div class="form-group">
                <label>Votre Numéro WhatsApp</label>
                <input type="tel" id="whatsapp" placeholder="Ex: +50937000000" required>
            </div>

            <button type="submit" class="btn-add">
                Ajouter au panier <i class="fas fa-shopping-basket"></i>
            </button>
        </form>
    </div>

    <script>
        // Configuration Firebase Master
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09",
            measurementId: "G-8FEQG6B7ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Calcul dynamique HTG
        const usdInput = document.getElementById('usdAmount');
        const totalDisplay = document.getElementById('totalHTG');

        usdInput.addEventListener('input', () => {
            const usd = parseFloat(usdInput.value) || 0;
            const total = usd * 150;
            totalDisplay.textContent = total.toLocaleString() + " HTG";
        });

        // Gestion du panier
        document.getElementById('meruForm').onsubmit = (e) => {
            e.preventDefault();
            
            const usd = parseFloat(usdInput.value);
            const orderItem = {
                category: "financière",
                name: "MERU",
                product: usd + " USD",
                price: usd * 150,
                email: document.getElementById('meruEmail').value,
                whatsapp: document.getElementById('whatsapp').value,
                id: Date.now()
            };

            let cart = JSON.parse(localStorage.getItem('foxstore_cart')) || [];
            cart.push(orderItem);
            localStorage.setItem('foxstore_cart', JSON.stringify(cart));

            window.location.href = "/pages/checkout/cart.html";
        };

        // Protection session
        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = "/login.html";
        });
    </script>
</body>
</html>
