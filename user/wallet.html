<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Mon Portefeuille</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           ROYAL BLUE & WHITE - PALETTE PROFESSIONNELLE
           ========================================================================== */
        :root {
            --royal-blue: #1e3a8a;
            --royal-light: #3b5ba5;
            --royal-dark: #0f2b6b;
            --white: #ffffff;
            --off-white: #f8fafc;
            --gray-50: #f9f9f9;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --success: #059669;
            --success-light: #d1fae5;
            --warning: #d97706;
            --warning-light: #fef3c7;
            --error: #dc2626;
            --error-light: #fee2e2;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --transition: all 0.2s ease;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        /* ==========================================================================
           RESET & BASE
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ==========================================================================
           HEADER
           ========================================================================== */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 40;
            box-shadow: var(--shadow-sm);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            color: var(--gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gray-100);
            color: var(--royal-blue);
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--royal-blue);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--gray-500);
            font-weight: 500;
            font-size: 0.875rem;
            margin-left: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            color: var(--gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .icon-btn:hover {
            background: var(--gray-100);
            color: var(--royal-blue);
        }

        /* ==========================================================================
           MAIN CONTENT
           ========================================================================== */
        .main {
            padding: 20px 16px 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ==========================================================================
           WALLET CARD - DESIGN INSPIRÉ DE L'IMAGE
           ========================================================================== */
        .wallet-card {
            background: linear-gradient(135deg, var(--royal-blue), var(--royal-dark));
            border-radius: var(--radius-lg);
            padding: 30px 24px;
            color: var(--white);
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .wallet-card::after {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .wallet-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .wallet-balance {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .wallet-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1rem;
        }

        .stat-change {
            color: var(--success);
            background: rgba(5, 150, 105, 0.2);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .stat-period {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* ==========================================================================
           ACTIONS BUTTONS
           ========================================================================== */
        .wallet-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .action-btn {
            background: var(--white);
            border: none;
            border-radius: var(--radius-md);
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--gray-700);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .action-btn i {
            font-size: 1.5rem;
            color: var(--royal-blue);
            transition: var(--transition);
        }

        .action-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            background: var(--royal-blue);
            color: var(--white);
        }

        .action-btn:hover i {
            color: var(--white);
        }

        .action-btn.deposit i { color: var(--success); }
        .action-btn.withdraw i { color: var(--warning); }
        .action-btn.transfer i { color: var(--royal-blue); }

        .action-btn.deposit:hover { background: var(--success); }
        .action-btn.withdraw:hover { background: var(--warning); }
        .action-btn.transfer:hover { background: var(--royal-blue); }

        /* ==========================================================================
           TRANSACTIONS SECTION
           ========================================================================== */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header h3 i {
            color: var(--royal-blue);
        }

        .section-link {
            color: var(--royal-blue);
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
        }

        .transactions-list {
            background: var(--white);
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .transaction-item {
            padding: 16px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .transaction-icon.deposit { color: var(--success); }
        .transaction-icon.withdraw { color: var(--warning); }
        .transaction-icon.transfer { color: var(--royal-blue); }

        .transaction-info h4 {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .transaction-info p {
            font-size: 0.75rem;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 0.875rem;
        }

        .transaction-amount.positive { color: var(--success); }
        .transaction-amount.negative { color: var(--error); }

        .transaction-status {
            font-size: 0.625rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--success-light);
            color: var(--success);
        }

        /* ==========================================================================
           TOAST NOTIFICATION
           ========================================================================== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--white);
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--royal-blue);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            font-weight: 500;
            font-size: 0.875rem;
            min-width: 250px;
        }

        .toast.active {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        /* ==========================================================================
           EMPTY STATE
           ========================================================================== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
            font-size: 0.875rem;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        /* ==========================================================================
           SKELETON LOADING
           ========================================================================== */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="/home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo">
                FOX<span>wallet</span>
            </div>
        </div>
        <div class="header-right">
            <a href="/user/account.html" class="icon-btn">
                <i class="fas fa-user"></i>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        
        <!-- Wallet Card -->
        <div class="wallet-card">
            <div class="wallet-label">Solde disponible</div>
            <div class="wallet-balance" id="walletBalance">0 HTG</div>
            
            <div class="wallet-stats">
                <div class="stat-item">
                    <i class="fas fa-arrow-up" style="color: var(--success);"></i>
                    <span class="stat-value" id="todayEarnings">+0 HTG</span>
                </div>
                <div class="stat-change" id="percentageChange">+0%</div>
                <div class="stat-period">&lt; 24h</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="wallet-actions">
            <a href="/user/deposit.html" class="action-btn deposit">
                <i class="fas fa-arrow-down"></i>
                <span>Déposer</span>
            </a>
            <a href="/user/withdraw.html" class="action-btn withdraw">
                <i class="fas fa-arrow-up"></i>
                <span>Retirer</span>
            </a>
            <a href="/user/transfert.html" class="action-btn transfer">
                <i class="fas fa-exchange-alt"></i>
                <span>Transférer</span>
            </a>
        </div>

        <!-- Transactions Section -->
        <div class="section-header">
            <h3>
                <i class="fas fa-history"></i>
                Transactions récentes
            </h3>
            <a href="/orders.html" class="section-link">Voir tout</a>
        </div>

        <div class="transactions-list" id="transactionsList">
            <!-- Les transactions seront chargées dynamiquement -->
            <div class="empty-state" id="emptyTransactions">
                <i class="fas fa-exchange-alt"></i>
                <p>Aucune transaction pour le moment</p>
            </div>
        </div>

    </main>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09"
        };

        // Initialisation Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==========================================================================
        // VARIABLES GLOBALES
        // ==========================================================================
        let currentUser = null;

        // ==========================================================================
        // UTILITAIRES
        // ==========================================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('active'), 100);
            setTimeout(() => {
                toast.classList.remove('active');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ==========================================================================
        // AUTHENTIFICATION
        // ==========================================================================
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadWalletData(user.uid);
                loadTransactions(user.uid);
            } else {
                window.location.href = '/login.html';
            }
        });

        // ==========================================================================
        // CHARGEMENT DU PORTEFEUILLE
        // ==========================================================================
        function loadWalletData(uid) {
            db.collection('wallets').doc(uid).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    const balance = data.balance || 0;
                    
                    // Formatage du solde
                    document.getElementById('walletBalance').textContent = balance.toLocaleString() + ' HTG';
                    
                    // Calcul des stats (simulées pour l'exemple)
                    const todayEarnings = Math.floor(balance * 0.012); // 1.2% du solde
                    document.getElementById('todayEarnings').textContent = '+' + todayEarnings.toLocaleString() + ' HTG';
                    document.getElementById('percentageChange').textContent = '+1.2%';
                } else {
                    // Créer un wallet si inexistant
                    db.collection('wallets').doc(uid).set({
                        balance: 0,
                        userId: uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    document.getElementById('walletBalance').textContent = '0 HTG';
                }
            });
        }

        // ==========================================================================
        // CHARGEMENT DES TRANSACTIONS
        // ==========================================================================
        function loadTransactions(uid) {
            db.collection('transactions')
                .where('userId', '==', uid)
                .orderBy('createdAt', 'desc')
                .limit(10)
                .onSnapshot(snapshot => {
                    const container = document.getElementById('transactionsList');
                    
                    if (snapshot.empty) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-exchange-alt"></i>
                                <p>Aucune transaction pour le moment</p>
                            </div>
                        `;
                        return;
                    }

                    let html = '';
                    snapshot.forEach(doc => {
                        const t = doc.data();
                        const date = t.createdAt ? new Date(t.createdAt.toDate()).toLocaleDateString('fr-FR') : 'Date inconnue';
                        
                        // Déterminer l'icône et la couleur selon le type
                        let icon = 'fa-arrow-down';
                        let iconClass = 'deposit';
                        let amountClass = 'positive';
                        let amountSign = '+';
                        
                        if (t.type === 'withdraw') {
                            icon = 'fa-arrow-up';
                            iconClass = 'withdraw';
                            amountClass = 'negative';
                            amountSign = '-';
                        } else if (t.type === 'transfer') {
                            icon = 'fa-exchange-alt';
                            iconClass = 'transfer';
                            amountClass = t.direction === 'sent' ? 'negative' : 'positive';
                            amountSign = t.direction === 'sent' ? '-' : '+';
                        }

                        // Statut
                        const status = t.status || 'complété';
                        const statusClass = status === 'en-attente' ? 'warning' : 'success';
                        const statusText = status === 'en-attente' ? 'En attente' : 'Complété';

                        html += `
                            <div class="transaction-item">
                                <div class="transaction-left">
                                    <div class="transaction-icon ${iconClass}">
                                        <i class="fas ${icon}"></i>
                                    </div>
                                    <div class="transaction-info">
                                        <h4>${t.description || t.type}</h4>
                                        <p>
                                            <i class="far fa-calendar"></i>
                                            ${date}
                                            <span class="transaction-status" style="background: var(--${statusClass}-light); color: var(--${statusClass});">${statusText}</span>
                                        </p>
                                    </div>
                                </div>
                                <div class="transaction-amount ${amountClass}">
                                    ${amountSign}${t.amount.toLocaleString()} HTG
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = html;
                });
        }

        // ==========================================================================
        // GESTIONNAIRE DE CONNEXION
        // ==========================================================================
        window.addEventListener('offline', () => {
            showToast('Connexion internet perdue', 'error');
        });

        window.addEventListener('online', () => {
            showToast('Connexion rétablie', 'success');
        });
    </script>
</body>
</html>
