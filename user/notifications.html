<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store - Notifications</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --secondary: #002d5e; --white: #ffffff; --bg: #f8fafc; --text: #1e293b; --muted: #64748b; --border: rgba(0, 86, 179, 0.08); --transition: all 0.4s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; }
        header { height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }
        .container { padding: 20px 5%; max-width: 600px; margin: 0 auto; }
        .notif-card { background: var(--white); padding: 20px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; gap: 15px; transition: var(--transition); animation: fadeIn 0.5s ease; }
        .notif-icon { width: 45px; height: 45px; background: #f0f7ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.2rem; flex-shrink: 0; }
        .notif-content h4 { font-size: 0.9rem; font-weight: 700; color: var(--secondary); margin-bottom: 4px; }
        .notif-content p { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
        .notif-time { font-size: 0.7rem; color: #cbd5e1; font-weight: 700; margin-top: 8px; display: block; text-transform: uppercase; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.2; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header><a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Notifications</h1></header>
    <div class="container" id="notifContainer">
        <div id="loading" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin color:var(--primary)"></i></div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("announcements").orderBy("createdAt", "desc").onSnapshot(snap => {
                    const cont = document.getElementById('notifContainer');
                    cont.innerHTML = '';
                    if(snap.empty) { cont.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>Aucune notification pour le moment.</p></div>'; return; }
                    snap.forEach(doc => {
                        const d = doc.data();
                        const time = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleDateString('fr-FR', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) : "À l'instant";
                        cont.innerHTML += `
                            <div class="notif-card">
                                <div class="notif-icon"><i class="fas fa-bullhorn"></i></div>
                                <div class="notif-content">
                                    <h4>Annonce Officielle</h4>
                                    <p>${d.message}</p>
                                    <span class="notif-time">${time}</span>
                                </div>
                            </div>`;
                    });
                });
            } else { window.location.href = "/login.html"; }
        });
    </script>
</body>
</html>
