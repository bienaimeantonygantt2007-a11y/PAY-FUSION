<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store — Retrait</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e3a8a; --secondary: #0f172a; --accent: #00d1ff;
            --white: #ffffff; --bg: #ffffff; --input-bg: #f8fafc;
            --text-main: #0f172a; --text-muted: #64748b;
            --error: #ef4444; --success: #10b981; --border: #e2e8f0;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; }

        header { height: 65px; background: #fff; display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: var(--transition); }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }

        .container { padding: 25px 5%; max-width: 600px; margin: 0 auto; }

        /* --- BALANCE INFO --- */
        .balance-strip { background: #f0f7ff; padding: 15px 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid rgba(30, 58, 138, 0.1); }
        .balance-strip span { font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .balance-strip b { font-size: 1rem; font-weight: 800; color: var(--secondary); }

        .card { background: #fff; border-radius: 20px; border: 1.5px solid var(--border); padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 25px; }
        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 16px; border: 1.5px solid var(--border); border-radius: 16px; outline: none; font-size: 1rem; font-weight: 700; color: var(--text-main); background: var(--input-bg); transition: 0.3s; appearance: none; }
        .form-group input:focus { border-color: var(--primary); background: #fff; }

        .btn-elite { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2); }
        .btn-elite:disabled { opacity: 0.6; cursor: not-allowed; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--primary)"></i><p style="margin-top:15px; font-weight:800;">Traitement du retrait...</p></div>

    <header>
        <a href="/user/wallet.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>Demander un Retrait</h1>
    </header>

    <div class="container">
        <div class="balance-strip">
            <span>Solde actuel</span>
            <b id="currentBalance">0.00 HTG</b>
        </div>

        <p class="section-label">Détails du retrait</p>
        <form id="withdrawForm">
            <div class="card">
                <div class="form-group">
                    <label>Montant à retirer (HTG)</label>
                    <input type="number" id="amount" placeholder="Ex: 500" required>
                </div>

                <div class="form-group">
                    <label>Méthode de réception</label>
                    <select id="method" required>
                        <option value="moncash">Moncash</option>
                        <option value="natcash">Natcash</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Numéro de téléphone / Coordonnées</label>
                    <input type="tel" id="recipientInfo" placeholder="Ex: +50937000000" required>
                </div>

                <div class="form-group">
                    <label>Nom complet sur le compte</label>
                    <input type="text" id="recipientName" placeholder="Ex: Jean Dupont" required>
                </div>
            </div>

            <button type="submit" class="btn-elite" id="submitBtn">Confirmer le retrait <i class="fas fa-hand-holding-usd"></i></button>
        </form>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();
        let userBalance = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    userBalance = doc.data().wallet_balance || 0;
                    document.getElementById('currentBalance').textContent = userBalance.toLocaleString() + " HTG";
                });
            } else { window.location.href = "/login.html"; }
        });

        document.getElementById('withdrawForm').onsubmit = async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            
            if(amount > userBalance) return alert("Solde insuffisant.");
            if(amount < 100) return alert("Le montant minimum est de 100 HTG.");

            document.getElementById('loader').style.display = 'flex';
            const user = auth.currentUser;

            try {
                // Création de la transaction de retrait (En attente de validation admin)
                await db.collection("wallet_transactions").add({
                    userId: user.uid,
                    userEmail: user.email,
                    type: "retrait",
                    amount: amount,
                    method: document.getElementById('method').value,
                    recipientInfo: document.getElementById('recipientInfo').value,
                    recipientName: document.getElementById('recipientName').value,
                    status: "en-attente",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Optionnel : On peut déduire le solde immédiatement ou attendre la validation admin.
                // Ici, pour plus de sécurité Fox Store, on bloque le montant seulement après validation.
                
                window.location.href = "/user/wallet.html";
            } catch (err) {
                alert("Erreur système.");
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
</body>
</html>
