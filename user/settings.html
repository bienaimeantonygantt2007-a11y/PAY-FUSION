<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store — Paramètres du Compte</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0056b3;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: rgba(0, 86, 179, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; }

        header {
            height: 60px; background: #fff; display: flex; align-items: center; 
            padding: 0 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .back-btn { color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #f0f7ff; }

        .container { padding: 20px 5%; max-width: 500px; margin: 0 auto; }

        .card { background: #fff; border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 0.9rem; font-weight: 600; background: #fcfcfd; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); background: #fff; }

        .btn-update { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 0.85rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-update:hover { background: #003d82; transform: translateY(-2px); }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 25px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; display: none; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="toast">Profil mis à jour <i class="fas fa-check-circle"></i></div>
    <header><a href="/home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1 style="font-size:0.9rem; margin-left:15px; font-weight:800;">Paramètres</h1></header>

    <div class="container">
        <p class="section-title">Informations du Profil</p>
        <div class="card">
            <form id="profileForm">
                <div class="form-group"><label>Prénom</label><input type="text" id="firstName" required></div>
                <div class="form-group"><label>Nom</label><input type="text" id="lastName" required></div>
                <div class="form-group"><label>Téléphone WhatsApp</label><input type="tel" id="phone" required></div>
                <button type="submit" class="btn-update">Enregistrer les changements <i class="fas fa-save"></i></button>
            </form>
        </div>

        <p class="section-title">Sécurité</p>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><h4 style="font-size:0.85rem; font-weight:800;">Mot de passe</h4><p style="font-size:0.7rem; color:var(--muted); font-weight:600;">Changer via email sécurisé</p></div>
                <button onclick="resetPass()" class="back-btn" style="width:auto; padding:0 15px;"><i class="fas fa-paper-plane" style="font-size:0.8rem;"></i></button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg", authDomain: "pay-fusion-6dfaf.firebaseapp.com", projectId: "pay-fusion-6dfaf", storageBucket: "pay-fusion-6dfaf.firebasestorage.app", messagingSenderId: "945593776812", appId: "1:945593776812:web:4475e1085fdfa31690fd09", measurementId: "G-8FEQG6B7ZY" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("users").doc(user.uid).get().then(doc => {
                    const info = doc.data().personalInfo;
                    document.getElementById('firstName').value = info.firstName;
                    document.getElementById('lastName').value = info.lastName;
                    document.getElementById('phone').value = info.phone;
                });
            } else { window.location.href = "/login.html"; }
        });

        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            const fn = document.getElementById('firstName').value;
            const ln = document.getElementById('lastName').value;
            const ph = document.getElementById('phone').value;

            await db.collection("users").doc(user.uid).update({
                "personalInfo.firstName": fn,
                "personalInfo.lastName": ln,
                "personalInfo.fullName": fn + " " + ln,
                "personalInfo.phone": ph
            });
            const t = document.getElementById('toast'); t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        };

        function resetPass() { auth.sendPasswordResetEmail(auth.currentUser.email).then(() => alert("Email envoyé !")); }
    </script>
</body>
</html>
