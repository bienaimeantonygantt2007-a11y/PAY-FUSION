<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store — Recharger mon compte</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0f172a;
            --white: #ffffff;
            --bg: #ffffff; 
            --input-bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        header {
            height: 65px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { 
            color: var(--primary); font-size: 1.2rem; text-decoration: none; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; transition: var(--transition);
        }

        .container { padding: 25px 5% 100px; max-width: 600px; margin: 0 auto; }

        .step-view { display: none; animation: slideIn 0.4s ease forwards; }
        .step-view.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .section-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }

        /* CARDS */
        .card { background: #fff; border-radius: 20px; border: 1.5px solid var(--border); padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 20px; }
        
        /* INPUTS */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        .form-group input { width: 100%; padding: 16px; border: 1.5px solid var(--border); border-radius: 16px; outline: none; font-size: 1rem; font-weight: 700; color: var(--text-main); background: var(--input-bg); transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.05); }

        /* METHOD BUTTONS */
        .method-item {
            background: #fff; border: 1.5px solid var(--border); padding: 18px;
            border-radius: 18px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.3s; margin-bottom: 10px;
        }
        .method-item:hover { border-color: var(--primary); background: #f8faff; }
        .method-left { display: flex; align-items: center; gap: 15px; }
        .method-left img { height: 32px; width: 32px; object-fit: contain; }
        .method-left span { font-weight: 800; font-size: 0.9rem; color: var(--secondary); }

        /* INSTRUCTIONS */
        .instr-box { background: #f0f7ff; border-left: 4px solid var(--primary); padding: 20px; border-radius: 15px; margin-bottom: 25px; font-size: 0.9rem; }
        .instr-box b { color: var(--primary); font-size: 1rem; }

        /* UPLOAD */
        .upload-zone { border: 2px dashed #cbd5e1; padding: 30px; border-radius: 18px; text-align: center; position: relative; cursor: pointer; background: var(--input-bg); }
        .upload-zone i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .upload-zone p { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }

        /* ALERT BOX */
        #alertBox { padding: 15px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; margin-bottom: 20px; display: none; text-align: center; }
        .err { background: #fff5f5; color: var(--error); border: 1px solid rgba(239, 68, 68, 0.1); }

        .btn-elite { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2); }
        .btn-elite:disabled { opacity: 0.5; cursor: wait; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-3x" style="color:var(--primary)"></i><p style="margin-top:20px; font-weight:800;">Traitement en cours...</p></div>

    <header>
        <a href="/user/wallet.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 id="headerTitle" style="font-size:0.9rem; font-weight:800; text-transform:uppercase; margin-left:10px;">Dépôt Portefeuille</h1>
    </header>

    <div class="container">
        
        <div id="alertBox" class="err"></div>

        <!-- STEP 1: AMOUNT -->
        <div id="step1" class="step-view active">
            <p class="section-label">1. Saisir le montant</p>
            <div class="card">
                <div class="form-group">
                    <label>Montant du dépôt (HTG)</label>
                    <input type="number" id="amountInput" placeholder="Min. 50 HTG" min="50">
                </div>
            </div>
            <button class="btn-elite" onclick="toStep(2)">Choisir la méthode <i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- STEP 2: METHOD -->
        <div id="step2" class="step-view">
            <p class="section-label">2. Choisir la méthode</p>
            <div class="method-list">
                <div class="method-item" onclick="startFinalStep('moncash', 'moncash-logo.png')">
                    <div class="method-left"><img src="/assets/logos/moncash-logo.png"><span>Moncash</span></div>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="method-item" onclick="startFinalStep('natcash', 'natcash-logo.png')">
                    <div class="method-left"><img src="/assets/logos/natcash-logo.png"><span>Natcash</span></div>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="method-item" onclick="startFinalStep('usdt', 'usdt-logo.png')">
                    <div class="method-left"><img src="/assets/logos/usdt-logo.png"><span>USDT (TRC20)</span></div>
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            <button class="btn-elite" style="background:none; color:var(--primary); box-shadow:none; margin-top:20px;" onclick="toStep(1)">Retour</button>
        </div>

        <!-- STEP 3: PROOF -->
        <div id="step3" class="step-view">
            <p class="section-label">3. Confirmer le transfert</p>
            <div class="instr-box" id="instructions"></div>

            <form id="submitDepositForm">
                <div class="card">
                    <div id="dynamicFields"></div>
                    <div class="form-group">
                        <label>Preuve de transfert</label>
                        <div class="upload-zone">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p id="fileLabel">Cliquer pour joindre le reçu</p>
                            <input type="file" id="proofInput" accept="image/*" required style="position:absolute; inset:0; opacity:0; cursor:pointer;">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-elite" id="finalBtn">Envoyer la preuve <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>

    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09",
            measurementId: "G-8FEQG6B7ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let depositAmount = 0;
        let depositMethod = "";
        let proofBase64 = "";

        // UI LOGIC
        function toStep(s) {
            if(s === 2) {
                depositAmount = parseFloat(document.getElementById('amountInput').value);
                if(!depositAmount || depositAmount < 50) { alert("Min. 50 HTG"); return; }
            }
            document.querySelectorAll('.step-view').forEach(view => view.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            window.scrollTo(0,0);
        }

        function startFinalStep(id, logo) {
            depositMethod = id;
            const instr = document.getElementById('instructions');
            const fields = document.getElementById('dynamicFields');
            fields.innerHTML = '';

            if(id === 'moncash' || id === 'natcash') {
                const num = id === 'moncash' ? '3653 5649' : '3566 9814';
                instr.innerHTML = `<p>Envoyez <b>${depositAmount.toLocaleString()} HTG</b> au :</p><b>+509 ${num}</b><br><p>Nom : <b>Jinolyse Pierre Louis</b></p>`;
                fields.innerHTML = `<div class="form-group"><label>Nom sur le compte</label><input type="text" id="sName" required></div><div class="form-group"><label>Numéro expéditeur</label><input type="tel" id="sPhone" required></div>`;
            } else {
                instr.innerHTML = `<p>Envoyez l'équivalent en USDT TRC20 à :</p><b style="font-size:0.6rem; word-break:break-all;">TBcmhXsvnsyVCL3k5bmhxxwYWDYTTiLiwi</b>`;
                fields.innerHTML = `<div class="form-group"><label>Votre Adresse Wallet</label><input type="text" id="sName" required></div><div class="form-group"><label>Hash de transaction (ID)</label><input type="text" id="sPhone" required></div>`;
            }
            toStep(3);
        }

        // IMAGE ENGINE
        document.getElementById('proofInput').onchange = function(e) {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('fileLabel').textContent = "Compression...";
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    proofBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('fileLabel').textContent = "Reçu chargé ✅";
                };
            };
        };

        // SUBMISSION ENGINE
        document.getElementById('submitDepositForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!proofBase64) { alert("Veuillez charger la preuve."); return; }

            document.getElementById('loader').style.display = 'flex';
            document.getElementById('finalBtn').disabled = true;

            const user = auth.currentUser;
            const senderName = document.getElementById('sName').value.trim();
            const senderPhone = document.getElementById('sPhone').value.trim();

            try {
                // ENREGISTREMENT DANS LA COLLECTION wallet_transactions
                await db.collection("wallet_transactions").add({
                    userId: user.uid,
                    userEmail: user.email,
                    type: "depot",
                    amount: depositAmount,
                    method: depositMethod,
                    senderName: senderName,
                    senderPhone: senderPhone,
                    proof: proofBase64,
                    status: "en-attente",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                window.location.href = "/user/wallet.html";
            } catch (err) {
                console.error("Firestore Error:", err);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('finalBtn').disabled = false;
                const alertBox = document.getElementById('alertBox');
                alertBox.textContent = "Erreur lors de l'envoi. Vérifiez votre connexion.";
                alertBox.style.display = 'block';
            }
        };

        auth.onAuthStateChanged(user => { if(!user) window.location.href = "/login.html"; });
    </script>
</body>
</html>
