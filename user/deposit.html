<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store — Effectuer un Dépôt</title>
    
    <!-- 
        ==========================================================================
        FOX STORE ARCHITECTURE v5.1 - WALLET DEPOSIT
        ZÉRO SIMULATION - INTÉGRATION FIRESTORE COMPLÈTE
        DESIGN: PURE WHITE & ROYAL BLUE
        ==========================================================================
    -->

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0f172a;
            --accent: #00d1ff;
            --white: #ffffff;
            --bg: #ffffff; 
            --input-bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; }

        /* --- HEADER --- */
        header {
            height: 65px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { 
            color: var(--primary); font-size: 1.2rem; text-decoration: none; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; transition: var(--transition);
        }
        header h1 { font-size: 0.95rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }

        .container { padding: 25px 5% 100px; max-width: 600px; margin: 0 auto; }

        /* --- STEPS LOGIC --- */
        .step-view { display: none; animation: slideUp 0.5s ease forwards; }
        .step-view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; }

        /* --- INPUTS & CARDS --- */
        .card { background: #fff; border-radius: 20px; border: 1.5px solid var(--border); padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 25px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        .form-group input { width: 100%; padding: 16px; border: 1.5px solid var(--border); border-radius: 16px; outline: none; font-size: 1rem; font-weight: 700; color: var(--text-main); background: var(--input-bg); transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.05); }

        /* --- METHOD GRID --- */
        .method-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .method-btn {
            background: #fff; border: 1.5px solid var(--border); padding: 20px 15px;
            border-radius: 20px; text-align: center; cursor: pointer; transition: var(--transition);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .method-btn:hover { border-color: var(--primary); transform: translateY(-3px); }
        .method-btn img { height: 35px; width: auto; object-fit: contain; }
        .method-btn span { font-size: 0.8rem; font-weight: 800; color: var(--secondary); }

        /* --- INSTRUCTIONS --- */
        .instruction-box { background: #f0f7ff; border-left: 4px solid var(--primary); padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .instruction-box h4 { font-size: 0.8rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; }
        .instruction-box p { font-size: 0.9rem; font-weight: 600; color: var(--secondary); margin-bottom: 4px; }
        .instruction-box b { color: var(--primary); }

        /* --- UPLOAD AREA --- */
        .upload-area { border: 2px dashed #cbd5e1; padding: 30px; border-radius: 18px; text-align: center; position: relative; cursor: pointer; background: var(--input-bg); transition: 0.3s; }
        .upload-area:hover { border-color: var(--primary); background: #fff; }
        .upload-area i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .upload-area p { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }

        /* --- BUTTONS --- */
        .btn-elite { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2); }
        .btn-elite:hover { background: var(--secondary); transform: translateY(-3px); }
        .btn-elite:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- LOADER --- */
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--primary)"></i>
        <p style="margin-top:15px; font-weight:800; color: var(--primary);">Sécurisation du dépôt...</p>
    </div>

    <header>
        <a href="/user/wallet.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 id="headerTitle">Nouveau Dépôt</h1>
    </header>

    <div class="container">
        
        <!-- STEP 1: AMOUNT -->
        <div id="step1" class="step-view active">
            <p class="section-label">Montant de la recharge</p>
            <div class="card">
                <div class="form-group">
                    <label>Combien souhaitez-vous déposer ? (HTG)</label>
                    <input type="number" id="depositAmount" placeholder="Ex: 1500" min="50" required>
                </div>
                <p style="font-size: 0.7rem; color: var(--text-muted); font-weight: 600;">Minimum de dépôt : 50 HTG. Aucun frais appliqué sur les dépôts portefeuille.</p>
            </div>
            <button class="btn-elite" onclick="goToStep(2)">Continuer <i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- STEP 2: METHODS -->
        <div id="step2" class="step-view">
            <p class="section-label">Méthode de paiement</p>
            <div class="method-grid">
                <div class="method-btn" onclick="setupFinalStep('moncash', 'moncash-logo.png')">
                    <img src="/assets/logos/moncash-logo.png" alt="Moncash">
                    <span>Moncash</span>
                </div>
                <div class="method-btn" onclick="setupFinalStep('natcash', 'natcash-logo.png')">
                    <img src="/assets/logos/natcash-logo.png" alt="Natcash">
                    <span>Natcash</span>
                </div>
                <div class="method-btn" onclick="setupFinalStep('usdt', 'usdt-logo.png')">
                    <img src="/assets/logos/usdt-logo.png" alt="USDT">
                    <span>USDT (TRC20)</span>
                </div>
                <div class="method-btn" onclick="setupFinalStep('wise', 'wise-logo.png')">
                    <img src="/assets/logos/wise-logo.png" alt="Wise">
                    <span>Wise</span>
                </div>
            </div>
            <button class="btn-elite" style="background: none; color: var(--primary); box-shadow: none; margin-top: 20px;" onclick="goToStep(1)">Retour</button>
        </div>

        <!-- STEP 3: INSTRUCTIONS & PROOF -->
        <div id="step3" class="step-view">
            <div style="text-align: center; margin-bottom: 20px;">
                <img id="activeMethodLogo" src="" style="height: 50px; margin-bottom: 10px;">
                <h3 id="activeMethodName" style="font-weight: 800; color: var(--secondary);">...</h3>
            </div>

            <div class="instruction-box" id="methodInstructions"></div>

            <form id="depositForm">
                <div class="card">
                    <div id="dynamicFields"></div>
                    <div class="form-group">
                        <label>Preuve de transfert (Screenshot)</label>
                        <div class="upload-area">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p id="fileLabel">Joindre le reçu de confirmation</p>
                            <input type="file" id="proofInput" accept="image/*" required style="position:absolute; inset:0; opacity:0; cursor:pointer;">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-elite">Envoyer ma demande <i class="fas fa-paper-plane"></i></button>
                <button type="button" class="btn-elite" style="background: none; color: var(--primary); box-shadow: none; margin-top: 10px;" onclick="goToStep(2)">Changer de méthode</button>
            </form>
        </div>

    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09",
            measurementId: "G-8FEQG6B7ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let depositAmount = 0;
        let selectedMethod = "";
        let proofBase64 = "";

        // AUTH GUARD
        auth.onAuthStateChanged(user => { if (!user) window.location.href = "/login.html"; });

        // NAVIGATION
        function goToStep(step) {
            if(step === 2) {
                depositAmount = parseFloat(document.getElementById('depositAmount').value);
                if(!depositAmount || depositAmount < 50) {
                    alert("Veuillez entrer un montant valide (Min. 50 HTG)");
                    return;
                }
            }
            document.querySelectorAll('.step-view').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            window.scrollTo(0,0);
        }

        // SETUP FINAL FORM
        function setupFinalStep(id, logo) {
            selectedMethod = id;
            document.getElementById('activeMethodLogo').src = `/assets/logos/${logo}`;
            document.getElementById('activeMethodName').textContent = id.toUpperCase();
            
            const instr = document.getElementById('methodInstructions');
            const fields = document.getElementById('dynamicFields');
            fields.innerHTML = '';

            if(id === 'moncash') {
                instr.innerHTML = `<h4>Instructions</h4><p>Envoyez <b>${depositAmount.toLocaleString()} HTG</b> au :</p><p>Numéro : <b>+509 3653 5649</b></p><p>Nom : <b>Jinolyse Pierre Louis</b></p>`;
                fields.innerHTML = `<div class="form-group"><label>Nom du compte Moncash</label><input type="text" id="senderName" required></div><div class="form-group"><label>Numéro de téléphone</label><input type="tel" id="senderInfo" required></div>`;
            } else if(id === 'natcash') {
                instr.innerHTML = `<h4>Instructions</h4><p>Envoyez <b>${depositAmount.toLocaleString()} HTG</b> au :</p><p>Numéro : <b>+509 3566 9814</b></p><p>Nom : <b>Jinolyse Pierre Louis</b></p>`;
                fields.innerHTML = `<div class="form-group"><label>Nom du compte Natcash</label><input type="text" id="senderName" required></div><div class="form-group"><label>Numéro de téléphone</label><input type="tel" id="senderInfo" required></div>`;
            } else if(id === 'wise') {
                instr.innerHTML = `<h4>Instructions</h4><p>Envoyez l'équivalent en Dollars au :</p><p>Email : <b>bmarcco4412@gmail.com</b></p><p>Wisetag : <b>@bmarcco</b></p>`;
                fields.innerHTML = `<div class="form-group"><label>Votre Email Wise</label><input type="text" id="senderName" required></div><div class="form-group"><label>Montant envoyé ($)</label><input type="number" id="senderInfo" required></div>`;
            } else {
                instr.innerHTML = `<h4>Instructions USDT (TRC20)</h4><p>Envoyez l'équivalent à l'adresse :</p><p style="font-size:0.65rem; word-break:break-all;"><b>TBcmhXsvnsyVCL3k5bmhxxwYWDYTTiLiwi</b></p>`;
                fields.innerHTML = `<div class="form-group"><label>Votre Adresse Wallet</label><input type="text" id="senderName" required></div><div class="form-group"><label>ID de transaction (Hash)</label><input type="text" id="senderInfo" required></div>`;
            }

            goToStep(3);
        }

        // COMPRESSION IMAGE
        document.getElementById('proofInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const scale = 800 / img.width;
                    canvas.width = 800; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    proofBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('fileLabel').innerHTML = `<i class="fas fa-check-circle" style="color:var(--success)"></i> Reçu chargé`;
                };
            };
            reader.readAsDataURL(file);
        };

        // SUBMISSION
        document.getElementById('depositForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!proofBase64) return alert("Veuillez joindre votre preuve.");

            document.getElementById('loader').style.display = 'flex';
            const user = auth.currentUser;
            const transId = "DEP-" + Date.now().toString().slice(-6);

            try {
                await db.collection("wallet_transactions").add({
                    userId: user.uid,
                    userEmail: user.email,
                    type: "depot",
                    amount: depositAmount,
                    method: selectedMethod,
                    senderName: document.getElementById('senderName').value,
                    senderInfo: document.getElementById('senderInfo').value,
                    proof: proofBase64,
                    status: "en-attente",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                window.location.href = "/user/wallet.html";
            } catch (err) {
                alert("Une erreur est survenue.");
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
</body>
</html>
