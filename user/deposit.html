<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Store — Recharger mon compte</title>
    
    <!-- 
        FOX STORE ARCHITECTURE v5.5 - ULTIMATE DEPOSIT ENGINE
        FUNNEL: AMOUNT > METHOD > PROOF
        ZERO SIMULATION | PURE WHITE DESIGN | CLOUD FIRESTORE READY
    -->

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome 6 Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0f172a;
            --accent: #00d1ff;
            --white: #ffffff;
            --bg: #ffffff; 
            --input-bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        /* --- HEADER & PROGRESS --- */
        header {
            height: 65px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { 
            color: var(--primary); font-size: 1.2rem; text-decoration: none; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; transition: var(--transition);
        }
        header h1 { font-size: 0.9rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; margin-left: 10px; flex: 1; }

        .progress-container { height: 3px; width: 100%; background: #f1f5f9; position: sticky; top: 65px; z-index: 999; }
        #progress-bar { height: 100%; width: 33%; background: var(--primary); transition: var(--transition); }

        .container { padding: 25px 5% 100px; max-width: 600px; margin: 0 auto; }

        /* --- STEPS COMPONENT --- */
        .step-view { display: none; animation: slideUp 0.5s ease forwards; }
        .step-view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        /* --- AMOUNT SELECTION (STEP 1) --- */
        .amount-input-box { background: var(--input-bg); border-radius: 25px; padding: 30px; text-align: center; border: 1.5px solid var(--border); margin-bottom: 25px; }
        .amount-input-box input { width: 100%; background: transparent; border: none; outline: none; text-align: center; font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .amount-input-box input::placeholder { color: #cbd5e1; }
        .currency-label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }

        .quick-amounts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .q-btn { padding: 12px; background: white; border: 1.5px solid var(--border); border-radius: 12px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .q-btn:active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- METHOD GRID (STEP 2) --- */
        .method-list { display: flex; flex-direction: column; gap: 12px; }
        .method-card {
            background: #fff; border: 1.5px solid var(--border); padding: 20px;
            border-radius: 20px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: var(--transition);
        }
        .method-card:hover { border-color: var(--primary); background: #f8faff; }
        .method-left { display: flex; align-items: center; gap: 15px; }
        .method-left img { height: 35px; width: 35px; object-fit: contain; }
        .method-left span { font-weight: 800; font-size: 0.95rem; color: var(--secondary); }
        .method-card i { color: #cbd5e1; }

        /* --- FINAL FORM (STEP 3) --- */
        .instruction-box { background: #f0f7ff; border-radius: 20px; padding: 25px; margin-bottom: 25px; border-left: 5px solid var(--primary); }
        .instruction-box h4 { font-size: 0.8rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; }
        .instruction-box b { color: var(--secondary); font-size: 1.1rem; }

        .form-card { background: #fff; border-radius: 25px; border: 1.5px solid var(--border); padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        .form-group input { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 0.95rem; font-weight: 600; background: var(--input-bg); transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); background: #fff; }

        .upload-area { border: 2px dashed #cbd5e1; padding: 30px; border-radius: 18px; text-align: center; position: relative; cursor: pointer; background: var(--input-bg); }
        .upload-area i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .upload-area p { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }

        /* --- BUTTONS --- */
        .btn-elite { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2); }
        .btn-elite:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- LOADER --- */
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color:var(--primary)"></i>
        <p style="margin-top:20px; font-weight:800; color: var(--primary); font-size: 1rem;">Validation sécurisée...</p>
    </div>

    <header>
        <a href="/user/wallet.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 id="headerTitle">Recharger</h1>
        <div style="width: 40px;"></div>
    </header>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="container">
        
        <!-- ÉTAPE 1 : MONTANT -->
        <div id="step1" class="step-view active">
            <p class="section-label">Étape 1 : Montant du dépôt</p>
            <div class="amount-input-box">
                <input type="number" id="depositAmount" placeholder="0" min="50">
                <div class="currency-label">Gourdes Haïtiennes (HTG)</div>
            </div>
            <div class="quick-amounts">
                <button class="q-btn" onclick="setAmount(500)">500</button>
                <button class="q-btn" onclick="setAmount(1000)">1,000</button>
                <button class="q-btn" onclick="setAmount(2500)">2,500</button>
            </div>
            <button class="btn-elite" onclick="goToStep(2)">Suivant <i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- ÉTAPE 2 : MÉTHODE -->
        <div id="step2" class="step-view">
            <p class="section-label">Étape 2 : Mode de paiement</p>
            <div class="method-list">
                <div class="method-card" onclick="setupFinalStep('moncash', 'moncash-logo.png')">
                    <div class="method-left"><img src="/assets/logos/moncash-logo.png"> <span>Moncash</span></div>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="method-card" onclick="setupFinalStep('natcash', 'natcash-logo.png')">
                    <div class="method-left"><img src="/assets/logos/natcash-logo.png"> <span>Natcash</span></div>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="method-card" onclick="setupFinalStep('usdt', 'usdt-logo.png')">
                    <div class="method-left"><img src="/assets/logos/usdt-logo.png"> <span>USDT (TRC20)</span></div>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="method-card" onclick="setupFinalStep('wise', 'wise-logo.png')">
                    <div class="method-left"><img src="/assets/logos/wise-logo.png"> <span>Wise</span></div>
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            <button class="btn-elite" style="background:none; color:var(--primary); box-shadow:none; margin-top:20px;" onclick="goToStep(1)">Modifier le montant</button>
        </div>

        <!-- ÉTAPE 3 : PREUVE -->
        <div id="step3" class="step-view">
            <p class="section-label">Étape 3 : Finalisation</p>
            <div class="instruction-box" id="methodInstructions"></div>

            <form id="depositForm">
                <div class="form-card">
                    <div id="dynamicFields"></div>
                    <div class="form-group">
                        <label>Capture du reçu de transfert</label>
                        <div class="upload-area">
                            <i class="fas fa-file-invoice-dollar"></i>
                            <p id="fileLabel">Joindre le Screenshot</p>
                            <input type="file" id="proofInput" accept="image/*" required style="position:absolute; inset:0; opacity:0; cursor:pointer;">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-elite" style="margin-top: 25px;">Envoyer le dépôt <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>

    </div>

    <script>
        // CONFIGURATION FIREBASE MASTER
        const firebaseConfig = {
            apiKey: "AIzaSyCUhf25OuIvuK-RGg02a1hF_ovN2TI7tDg",
            authDomain: "pay-fusion-6dfaf.firebaseapp.com",
            projectId: "pay-fusion-6dfaf",
            storageBucket: "pay-fusion-6dfaf.firebasestorage.app",
            messagingSenderId: "945593776812",
            appId: "1:945593776812:web:4475e1085fdfa31690fd09",
            measurementId: "G-8FEQG6B7ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let amount = 0;
        let method = "";
        let proofBase64 = "";

        // UI HELPERS
        function setAmount(val) { document.getElementById('depositAmount').value = val; }

        function goToStep(step) {
            if(step === 2) {
                amount = parseFloat(document.getElementById('depositAmount').value);
                if(!amount || amount < 50) return alert("Montant minimum : 50 HTG");
                document.getElementById('progress-bar').style.width = '66%';
            } else if (step === 1) {
                document.getElementById('progress-bar').style.width = '33%';
            }
            document.querySelectorAll('.step-view').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            window.scrollTo(0,0);
        }

        function setupFinalStep(id, logo) {
            method = id;
            document.getElementById('progress-bar').style.width = '100%';
            const instr = document.getElementById('methodInstructions');
            const fields = document.getElementById('dynamicFields');
            fields.innerHTML = '';

            if(id === 'moncash' || id === 'natcash') {
                const num = id === 'moncash' ? '3653 5649' : '3566 9814';
                instr.innerHTML = `<h4>Transfert ${id.toUpperCase()}</h4><p>Envoyez <b>${amount.toLocaleString()} HTG</b> au :</p><b>+509 ${num}</b><br>Nom : <b>Jinolyse Pierre Louis</b>`;
                fields.innerHTML = `<div class="form-group"><label>Nom sur le compte</label><input type="text" id="sName" required></div><div class="form-group"><label>Numéro expéditeur</label><input type="tel" id="sInfo" required></div>`;
            } else if(id === 'wise') {
                instr.innerHTML = `<h4>Transfert WISE</h4><p>Envoyez l'équivalent en Dollars au :</p><b>bmarcco4412@gmail.com</b><br>Tag : <b>@bmarcco</b>`;
                fields.innerHTML = `<div class="form-group"><label>Votre Email Wise</label><input type="email" id="sName" required></div><div class="form-group"><label>Montant en $</label><input type="number" id="sInfo" required></div>`;
            } else {
                instr.innerHTML = `<h4>Paiement USDT (TRC20)</h4><p>Envoyez à l'adresse :</p><b style="font-size:0.6rem; word-break:break-all;">TBcmhXsvnsyVCL3k5bmhxxwYWDYTTiLiwi</b>`;
                fields.innerHTML = `<div class="form-group"><label>Votre Adresse Wallet</label><input type="text" id="sName" required></div><div class="form-group"><label>Hash / TXID</label><input type="text" id="sInfo" required></div>`;
            }
            goToStep(3);
        }

        // COMPRESSION ET CONVERSION IMAGE
        document.getElementById('proofInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 800;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    proofBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('fileLabel').innerHTML = `<i class="fas fa-check-circle" style="color:var(--success)"></i> Capture chargée`;
                };
            };
            reader.readAsDataURL(file);
        };

        // ENVOI À FIRESTORE
        document.getElementById('depositForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!proofBase64) return alert("Veuillez joindre la preuve.");

            document.getElementById('loader').style.display = 'flex';
            const user = auth.currentUser;

            try {
                await db.collection("wallet_transactions").add({
                    userId: user.uid,
                    userEmail: user.email,
                    type: "depot",
                    amount: amount,
                    method: method,
                    senderName: document.getElementById('sName').value,
                    senderInfo: document.getElementById('sInfo').value,
                    proof: proofBase64,
                    status: "en-attente",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                window.location.href = "/user/wallet.html";
            } catch (err) {
                alert("Erreur lors de l'envoi.");
                document.getElementById('loader').style.display = 'none';
            }
        };

        // PROTECT SESSION
        auth.onAuthStateChanged(user => { if (!user) window.location.href = "/login.html"; });
    </script>
</body>
</html>
